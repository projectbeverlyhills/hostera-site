/**
 * =========================
 * Theme Toggle / Переключение темы
 * =========================
 * Палитры тем заданы как наборы CSS-переменных. applyTheme() проставляет их
 * инлайном в :root, что позволяет менять тему на лету (в т.ч. из конфига).
 * Дублирует значения из :root в <style>, но даёт программный доступ из JS.
 */
const lightTheme = {
  '--bg1': '#F5F5F7',
  '--bg2': '#FFFFFF',
  '--card': 'rgba(255, 255, 255, 0.95)',
  '--card2': '#FFFFFF',
  '--stroke': '#E0E0E0',
  '--stroke2': '#CCCCCC',
  '--text': '#1C1C1E',
  '--muted': '#666666',
  '--muted2': '#6E6E73',
  '--chip': '#F5F5F5',
  '--chipActive': '#F6E9DD',
  '--good': '#C76B28',
  '--accent': '#C76B28',
  '--accentSoft': '#D9883F',
  '--navAccent': '#C76B28',
  '--navActiveBg': '#F6E9DD',
  '--track': '#EFE7DE',
  '--shadow': '0 2px 8px rgba(0,0,0,0.06)'
};

const darkTheme = {
  '--bg1': '#1C1C1E',
  '--bg2': '#1C1C1E',
  '--card': 'rgba(44, 44, 46, 0.95)',
  '--card2': '#2C2C2E',
  '--stroke': '#3A3A3C',
  '--stroke2': '#48484A',
  '--text': '#F5F5F7',
  '--muted': '#B0B0B0',
  '--muted2': '#8E8E93',
  '--chip': '#2C2C2E',
  '--chipActive': '#3A2A1B',
  '--good': '#D9883F',
  '--accent': '#D9883F',
  '--accentSoft': '#E5A063',
  '--navAccent': '#D9883F',
  '--navActiveBg': '#3A2A1B',
  '--track': '#3A342E',
  '--shadow': '0 2px 8px rgba(0,0,0,0.3)'
};

// Применяет тему: проставляет CSS-переменные выбранной палитры в :root инлайном.
function applyTheme(theme) {
  const themeVars = theme === 'dark' ? darkTheme : lightTheme;
  const root = document.documentElement;
  for (const [key, value] of Object.entries(themeVars)) {
    root.style.setProperty(key, value);
  }
}

// Принудительно возвращает светлую тему и забывает сохранённый выбор
// (используется при возврате на экран выбора меню).
function resetThemeToLight() {
  localStorage.removeItem('theme');
  document.documentElement.setAttribute('data-theme', 'light');
  applyTheme('light');
  updateThemeButton('light');
  updateSettingsThemeIndicator();
}

// Инициализация темы при старте: восстанавливает сохранённую в localStorage.
function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  applyTheme(savedTheme);
  updateThemeButton(savedTheme);
}

// Переключает тему light<->dark и запоминает выбор в localStorage.
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const newTheme = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', newTheme);
  applyTheme(newTheme);
  localStorage.setItem('theme', newTheme);
  updateThemeButton(newTheme);
}

// Обновляет иконку (🌙/☀️) и подсказку у кнопки переключения темы.
function updateThemeButton(theme) {
  const btn = $('themeToggleBtn');
  if (btn) {
    btn.textContent = theme === 'light' ? '🌙' : '☀️';
    btn.title = theme === 'light' ? 'Switch to dark mode' : 'Switch to light mode';
  }
}

/**
 * Держит sticky-отступы табов секций в согласии с реальной высотой шапки
 * и панели табов. Высоты пишутся в CSS-переменные --topbar-h / --tabs-h,
 * чтобы перенос табов или шапки на мобильном не перекрывал контент ниже.
 * Keeps sticky offsets for section tabs in sync with the actual
 * topbar / tabs heights, so wrapped tabs or a wrapped mobile topbar
 * never overlap the rows below them.
 */
function syncStickyOffsets() {
  const root = document.documentElement;
  const topbar = document.querySelector('.topbar');
  const tabs = $('sectionTabs');
  if (topbar) {
    root.style.setProperty('--topbar-h', Math.round(topbar.getBoundingClientRect().height) + 'px');
  }
  if (tabs && !tabs.classList.contains('hidden')) {
    root.style.setProperty('--tabs-h', Math.round(tabs.getBoundingClientRect().height) + 'px');
  } else {
    root.style.setProperty('--tabs-h', '0px');
  }
}

// Инициализирует синхронизацию sticky-отступов: пересчитывает их через
// ResizeObserver (изменение высоты шапки/табов) и на resize окна.
function initStickyOffsets() {
  syncStickyOffsets();
  if (typeof ResizeObserver !== 'undefined') {
    const ro = new ResizeObserver(() => syncStickyOffsets());
    const topbar = document.querySelector('.topbar');
    const tabs = $('sectionTabs');
    if (topbar) ro.observe(topbar);
    if (tabs) ro.observe(tabs);
  }
  window.addEventListener('resize', syncStickyOffsets);
}

/**
 * =========================
 * 2) URL params (deep-links) / Роутинг и глубокие ссылки
 * =========================
 * Состояние приложения (ресторан/меню/секция/открытое вино) отражается в URL,
 * чтобы ссылки были «расшариваемыми» и работала кнопка «назад» браузера.
 * Локально (file:// или localhost) используется hash-роутинг, на проде —
 * «красивые» пути вида /restaurant/menu. Параметры section и w (id вина)
 * всегда живут в query-строке.
 */

// «Красивые» пути (/novikov_bh) требуют server-side rewrites. Используем
// #/-роутинг всегда, кроме случая, когда страница УЖЕ открыта по pretty-URL —
// это доказывает, что сервер умеет rewrites. Статическая раздача (localhost,
// file://, GitHub Pages — в т.ч. на подпути /hostera-site/) остаётся на #/,
// иначе history.replaceState на pretty-путь дал бы 404 при перезагрузке.
function shouldUseHashRouting() {
  if (window.location.protocol === 'file:') return true;
  if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') return true;
  return window.location.pathname.includes('/winegallery/');
}

/**
 * Разбирает текущий URL в объект маршрута { r, menu, section, w }.
 * Поддерживает оба формата: hash (#/restaurant/menu) и pretty-path
 * (/restaurant/menu), аккуратно пропуская имя папки 'winegallery' в пути.
 * Ключ 'waste' в URL маппится на внутренний WASTE_MENU_KEY.
 */
function readRoute() {
  const u = new URL(window.location.href);
  const p = u.searchParams;
  const cleanPath = u.pathname.replace(/\/index\.html$/i, '').replace(/\/$/, '');
  const parts = cleanPath.split('/').filter(Boolean);
  const hashParts = (u.hash && u.hash.startsWith('#/')) ? u.hash.slice(2).split('/').filter(Boolean) : [];
  
  // Skip folder name (e.g., 'winegallery'), take the rest
  let pathRestaurant = null;
  let pathMenu = null;
  
  if (hashParts.length) {
    pathRestaurant = hashParts[0] || null;
    pathMenu = hashParts[1] || null;
  } else if (parts.length >= 1) {
    // Сегменты до 'winegallery' включительно — это путь к приложению (на
    // GitHub Pages сайт живёт на подпути: /hostera-site/winegallery/...),
    // маршрут — только то, что после. Сегменты ПЕРЕД папкой (например,
    // 'hostera-site') ресторанами не являются.
    const wgIdx = parts.indexOf('winegallery');
    if (wgIdx >= 0) {
      // Path like [/prefix]/winegallery[/restaurant[/menu]]
      pathRestaurant = parts[wgIdx + 1] || null;
      pathMenu = parts[wgIdx + 2] || null;
    } else {
      // Direct pretty path like /novikov or /novikov/wine
      pathRestaurant = parts[0];
      pathMenu = parts[1] || null;
    }
  }

  return {
    r: pathRestaurant || p.get('r'),
    menu: (pathMenu === 'waste' ? WASTE_MENU_KEY : pathMenu) || p.get('menu'),
    section: normalizeSectionKey(p.get('section')),
    w: p.get('w')
  };
}

// Обратная к readRoute: собирает путь URL из ресторана и меню,
// выбирая hash- или pretty-формат в зависимости от окружения.
function buildPath(r, menu) {
  if (shouldUseHashRouting()) {
    const bp = getBasePath();
    const base = bp.endsWith('/') ? bp : `${bp}/`;
    if (!r) return base;
    const routeMenu = menu === WASTE_MENU_KEY ? 'waste' : menu;
    const suffix = routeMenu ? `${r}/${routeMenu}` : `${r}`;
    return `${base}#/${suffix}`;
  }
  if (!r) return '/';
  const routeMenu = menu === WASTE_MENU_KEY ? 'waste' : menu;
  if (!routeMenu) return `/${r}`;
  return `/${r}/${routeMenu}`;
}

/**
 * Записывает новое состояние в URL. В объекте next можно передать только
 * изменяемые ключи (r/menu/section/w); неуказанные берутся из state.
 * Значение null у ключа удаляет соответствующий параметр. mode:
 * 'replace' — без новой записи в истории, 'push' — с записью (кнопка «назад»).
 */
function writeUrlParams(next, mode = 'replace') {
  const u = new URL(window.location.href);
  const p = u.searchParams;

  const targetRestaurant = next.r !== undefined ? next.r : state.restaurantId;
  const targetMenu = next.menu !== undefined ? next.menu : state.menuKey;

  p.delete('r');
  p.delete('menu');
  if (next.section !== undefined) {
    if (next.section) p.set('section', next.section); else p.delete('section');
  }
  if (next.w !== undefined) {
    if (next.w) p.set('w', next.w); else p.delete('w');
  }

  const newPath = buildPath(targetRestaurant, targetMenu);
  const newUrl = newPath + (p.toString() ? '?' + p.toString() : '');

  if (mode === 'push') history.pushState(null, '', newUrl);
  else history.replaceState(null, '', newUrl);
}

// Полностью синхронизирует URL с текущим state (все 4 параметра сразу).
function syncUrl(mode = 'replace') {
  writeUrlParams({
    r: state.restaurantId,
    menu: state.menuKey,
    section: state.activeSection,
    w: state.modalWineId
  }, mode);
}

// --- Выбор секции/подсекции по умолчанию ---

// Первая доступная секция текущего меню (или пусто).
function getDefaultSection() {
  return state.sectionsEffective?.[0] || '';
}

// Первая подсекция внутри секции (или пусто, если подсекций нет).
function getDefaultSubsection(sectionKey) {
  const subsections = sectionKey ? getSubsectionsForSection(sectionKey, state.wines) : [];
  return subsections.length ? subsections[0].key : '';
}

// Выставляет активную секцию: предпочитаемую (например, из URL), если она
// существует среди доступных, иначе — первую. Подсекцию сбрасывает на дефолтную.
function applyDefaultSectionSelection(preferredSection) {
  const fallbackSection = getDefaultSection();
  const nextSection = preferredSection && state.sectionsEffective.includes(preferredSection)
    ? preferredSection
    : fallbackSection;

  state.activeSection = nextSection || '';
  state.activeSubsection = nextSection ? (getDefaultSubsection(nextSection) || '') : '';
}

/**
 * =========================
 * 3) CSV parsing + mapping / Парсинг CSV и маппинг строк в объекты вин
 * =========================
 * Данные приходят из Google Sheets как CSV. Здесь сырой текст превращается
 * сначала в матрицу строк, затем в объекты по заголовкам, и наконец —
 * в нормализованную доменную модель «вино» (mapWineRow), на которой
 * работает весь рендер.
 */

/**
 * Минимальный потоковый CSV-парсер (свой, без библиотек — single-file стек).
 * Корректно обрабатывает кавычки, экранированные кавычки ("") внутри поля,
 * запятые-разделители и переносы строк. \r игнорируется (Windows-окончания).
 * Возвращает массив массивов (строки → ячейки).
 */
function parseCSV(text) {
  const rows = [];
  let row = [];
  let cur = '';
  let inQ = false;

  for (let i=0; i<text.length; i++) {
    const ch = text[i];
    const next = text[i+1];

    if (inQ) {
      if (ch === '"' && next === '"') { cur += '"'; i++; }
      else if (ch === '"') inQ = false;
      else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(cur); cur=''; }
      else if (ch === '\n') { row.push(cur); rows.push(row); row=[]; cur=''; }
      else if (ch === '\r') { /* ignore */ }
      else cur += ch;
    }
  }
  if (cur.length || row.length) { row.push(cur); rows.push(row); }

  return rows;
}

/**
 * Превращает CSV в массив объектов, где ключи — заголовки первой строки.
 * Дополнительно дублирует каждый ключ в нижнем регистре, чтобы доступ
 * был нечувствителен к регистру заголовков таблицы.
 */
function csvToObjects(csvText) {
  const rows = parseCSV(csvText);
  if (!rows.length) return [];
  const headers = rows[0].map(h => safe(h).trim());
  const objects = [];

  for (let i=1; i<rows.length; i++) {
    const r = rows[i];
    const obj = {};
    for (let j=0; j<headers.length; j++) {
      const key = headers[j];
      const value = r[j] ?? '';
      obj[key] = value;
      const lowerKey = key.toLowerCase();
      if (!obj.hasOwnProperty(lowerKey)) {
        obj[lowerKey] = value;
      }
    }
    objects.push(obj);
  }
  return objects;
}

// \u041F\u0430\u0440\u0441\u0438\u0442 \u0431\u0443\u043B\u0435\u0432\u043E \u0437\u043D\u0430\u0447\u0435\u043D\u0438\u0435 \u0438\u0437 CSV. \u0412\u0410\u0416\u041D\u041E: \u043F\u0443\u0441\u0442\u0430\u044F \u044F\u0447\u0435\u0439\u043A\u0430 \u0442\u0440\u0430\u043A\u0442\u0443\u0435\u0442\u0441\u044F \u043A\u0430\u043A true
// (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E \u043F\u043E\u0437\u0438\u0446\u0438\u044F \u0432\u0438\u0434\u0438\u043C\u0430/\u0434\u043E\u0441\u0442\u0443\u043F\u043D\u0430, \u0435\u0441\u043B\u0438 \u043D\u0435 \u0443\u043A\u0430\u0437\u0430\u043D\u043E \u043E\u0431\u0440\u0430\u0442\u043D\u043E\u0435).
function toBool(v) {
  const s = String(v ?? '')
    .replace(/\u00A0/g, ' ')
    .trim()
    .toLowerCase();

  if (s === '') return true;
  return ['1', 'true', 'yes', 'y', 'on'].includes(s);
}

// Собирает «стог сена» для поиска: склеивает поля в одну строку, приводит
// к нижнему регистру и снимает диакритику — чтобы поиск был регистро- и
// акцент-независимым (искать «cotes» находит «Côtes»).
function buildSearchHaystack(parts) {
  return parts
    .map(v => String(v ?? '').replace(/\u00A0/g, ' ').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036F]/g, ''))
    .filter(Boolean)
    .join(' ');
}

// Безопасный парсинг числа из CSV (поддерживает запятую как десятичный разделитель).
function toNum(v) {
  const n = Number(String(v ?? '').replace(',', '.').trim());
  return isFinite(n) ? n : null;
}

// Заголовок карточки вина: «Производитель Название Винтаж» (пустые поля опускаются).
function buildWineTitle(x) {
  const producer = String(x.producer ?? '').trim();
  const name = String(x.name ?? '').trim();
  const vintage = String(x.vintage ?? '').trim();
  const base = [producer, name].filter(Boolean).join(' ');
  return [base, vintage].filter(Boolean).join(' ');
}

// Подзаголовок карточки: «Страна • Регион | Суб-регион • Сорт» через буллеты.
function buildWineSub(x) {
  const country = String(x.country ?? '').trim();
  const region = String(x.region ?? '').trim();
  const subregion = String(x['sub-region'] ?? x.subregion ?? '').trim();
  const grape = String(x.grape ?? '').trim();
  const regionDisplay = [region, subregion].filter(Boolean).join(' | ');
  return [country, regionDisplay, grape].filter(Boolean).join(' \u2022 ');
}

/**
 * ЦЕНТРАЛЬНЫЙ маппер: одна сырая строка CSV → нормализованный объект «вино».
 * Здесь происходит вся «грязная» работа с разнообразием заголовков таблицы:
 * запасные имена колонок (id/№/wine_id, story/description, bottle_img/...),
 * нормализация ключей секций/подсекций, флаги visible/available и заранее
 * посчитанный searchHaystack. Поле raw хранит исходную строку на всякий случай.
 */
function mapWineRow(x) {
  const section = String(x.section ?? x.section_key ?? '').trim();
  const sectionKeyRaw = String(x.section_key ?? '').trim();
  const sectionKey = normalizeSectionKey(sectionKeyRaw || section);

  const visible = toBool(x.visible);
  const available = toBool(x.is_available);

  const producer = String(x.producer ?? '').trim();
  const country = String(x.country ?? '').trim();
  const region = String(x.region ?? '').trim();
  const subregion = String(x['sub-region'] ?? x.subregion ?? '').trim();
  const grape = String(x.grape ?? '').trim();

  return {
    id: String(x['\u2116'] ?? x.id ?? x.wine_id ?? '').trim(),
    title: buildWineTitle(x),
    sub: buildWineSub(x),
    section,
    sectionKey,
    producer,
    country,
    region,
    subregion,
    grape,
    searchHaystack: buildSearchHaystack([buildWineTitle(x), producer, country, region, subregion, grape]),
    description: String(x.story ?? x.description ?? '').trim(),
    notes: String(x.notes ?? x.notes_profile ?? '').trim(),
    pairing: String(x.pairing ?? '').trim(),
    imageUrl: String(x.bottle_img ?? x.primary_image_url ?? '').trim(),
    priceGlass: x.btg_price ?? '',
    priceBottle: x.bottle_price ?? '',
    subsectionKey: normalizeSectionKey(String(x['subsection_key '] ?? x.subsection_key ?? '').trim()),
    subsectionLabel: String((x['subsection_key '] ?? x.subsection_key ?? '')).trim(),
    btg: String(x.btg ?? '').trim(),
    order: toNum(x.order),
    raw: x,
    visible,
    available,
  };
}

/**
 * Разбирает строку вкусовых нот (разделители | , ;) в список ключей-токенов.
 * Логика: дедуп по сырому тексту → резолв в известный токен с иконкой →
 * дедуп по ключу токена → сортировка по приоритету (NOTE_PRIORITY_INDEX),
 * при равенстве — по порядку в исходной строке. Возвращает максимум 3 ноты.
 */
function parseNotesChips(s) {
  const raw = String(s || '')
    .split(/[|,;]/g)
    .map(x => x.trim().replace(/_/g, ' '))
    .filter(Boolean);

  const seenRaw = new Set();
  const resolved = [];

  raw.forEach((item, sourceOrder) => {
    const rawKey = item.toLowerCase();
    if (seenRaw.has(rawKey)) return;
    seenRaw.add(rawKey);

    const token = resolveTokenEntry(item);
    if (!token || !token.icon) return;
    if (resolved.some(x => x.key === token.key)) return;

    const priority = NOTE_PRIORITY_INDEX.has(token.key)
      ? NOTE_PRIORITY_INDEX.get(token.key)
      : Number.MAX_SAFE_INTEGER;

    resolved.push({ key: token.key, priority, sourceOrder });
  });

  resolved.sort((a, b) => {
    if (a.priority !== b.priority) return a.priority - b.priority;
    return a.sourceOrder - b.sourceOrder;
  });

  return resolved.slice(0, 3).map(x => x.key);
}


// Формирует до 2 чипов-меток для карточки вина (секция + сорт), с дедупом.
function buildCardChips(w) {
  const chips = [];
  const section = labelForSectionKey(w.sectionKey);
  if (section) chips.push(section);
  if (chips.length < 2 && safe(w.grape)) chips.push(w.grape);

  const seen = new Set();
  const out = [];
  for (const c of chips) {
    const key = String(c || '').toLowerCase();
    if (!key || seen.has(key)) continue;
    seen.add(key);
    out.push(c);
    if (out.length >= 2) break;
  }
  return out;
}

// Разбивает строку гастро-пар (pairing) на список, максимум 4 пункта.
function buildPairingList(text) {
  const raw = String(text || '')
    .split(/[|,;/]/g)
    .map(x => x.trim())
    .filter(Boolean);
  return raw.slice(0, 4);
}

// Ноты вина в виде токенов (тонкая обёртка над parseNotesChips).
function getNoteTokensForWine(w) {
  return parseNotesChips(w.notes);
}

/**
 * Читает числовое значение профиля вкуса из сырой строки по списку
 * возможных имён колонок и нормализует его в шкалу 0..100.
 * Неочевидно: значения <=5 трактуются как 1..5-балльная шкала и
 * масштабируются ((val-1)*25), всё остальное — как уже проценты.
 */
function readProfileValue(raw, keys) {
  for (const key of keys) {
    if (raw && raw[key] !== undefined && raw[key] !== null) {
      const val = Number(String(raw[key]).replace(',', '.'));
      if (isFinite(val)) {
        if (val <= 5) return Math.max(0, Math.min(100, (val - 1) * 25));
        return Math.max(0, Math.min(100, val));
      }
    }
  }
  return null;
}

// --- Блок профиля вкуса вина (диаграмма body/acidity/sweetness/...) ---

// Базовый профиль вкуса вина: приоритет у сорта винограда (wine-profiles.js),
// иначе пресет по секции. Внутри — защитный фолбэк, если база знаний не
// загрузилась: грубое деление на красное/прочее.
// Per-wine taste base: grape variety first (assets/js/wine-profiles.js),
// then section preset. Returns body/acidity/sweetness/texture[/tannins]/textureLabel.
function inferProfile(sectionKey = '', grape = '') {
  if (window.WineProfiles) return window.WineProfiles.resolve(grape, sectionKey);
  // Defensive fallback if the knowledge base failed to load.
  const key = String(sectionKey || '').toLowerCase();
  if (key.includes('red')) {
    return { body: 72, acidity: 55, sweetness: 12, texture: 72, tannins: 62, textureLabel: ['Smooth', 'Firm'] };
  }
  return { body: 38, acidity: 64, sweetness: 12, texture: 36, textureLabel: ['Crisp', 'Creamy'] };
}

// Красное ли вино — определяется по наличию 'red' в ключе секции.
function isRedWine(sectionKey = '') {
  return String(sectionKey || '').toLowerCase().includes('red');
}

/**
 * Итоговый профиль вкуса конкретного вина для радар-диаграммы.
 * Берёт базовый профиль (inferProfile) и переопределяет каждую ось явным
 * значением из CSV, если оно задано. Ось «tannins» добавляется только для
 * красных вин.
 */
function getWineProfile(w) {
  const raw = w?.raw || {};
  const base = inferProfile(w.sectionKey, w.grape);
  const body = readProfileValue(raw, ['body', 'body_level', 'profile_body']) ?? base.body;
  const acidity = readProfileValue(raw, ['acidity', 'acidity_level', 'profile_acidity']) ?? base.acidity;
  const sweetness = readProfileValue(raw, ['sweetness', 'sweetness_level', 'profile_sweetness']) ?? base.sweetness;
  const texture = readProfileValue(raw, ['texture', 'texture_level', 'profile_texture']) ?? base.texture;
  const profile = { body, acidity, sweetness, texture, textureLabel: base.textureLabel };
  if (isRedWine(w.sectionKey)) {
    profile.tannins = readProfileValue(raw, ['tannins', 'tannin', 'tannins_level', 'profile_tannins'])
      ?? (base.tannins ?? 60);
  }
  return profile;
}

  'VANILLA.png',
];

// Словарь токенов нот: ключ — нормализованное имя (lower-case), значение —
// { label: красивая подпись, icon: имя PNG-файла }. Строится из имён файлов.
const TOKEN_DICTIONARY = NOTE_ICON_FILES.reduce((acc, file) => {
  const raw = file.replace(/\.png$/i, '').replace(/_/g, ' ').toLowerCase();
  const label = raw.replace(/(^|[\s-])\w/g, (m) => m.toUpperCase());
  acc[raw] = { label, icon: file };
  return acc;
}, {});

// Единый глобальный приоритет показа нот для всех карточек и языков.
// Базируется на текущих данных меню: сначала фруктовый профиль,
// затем цветочные/травяные/пряные, затем минерально-землистые и выдержка.
const NOTE_PRIORITY_ORDER = [
  'citrus',
  'tree fruit',
  'tropical fruit',
  'floral',
  'red fruit',
  'black fruit',
  'dried fruit',
  'herbal',
  'savory herb',
  'green pepper',
  'spice',
  'pepper',
  'saffron',
  'tea',
  'tobacco',
  'mineral',
  'soil',
  'oaky',
  'nutty',
  'vanilla',
  'honeyed',
  'buttery',
  'cocoa',
  'grassy',
  'umami',
  'pungent',
  'burnt',
  'chemical',
  'sulfur',
];

// Быстрый доступ «ключ ноты → её приоритет» (индекс в NOTE_PRIORITY_ORDER).
const NOTE_PRIORITY_INDEX = new Map(
  NOTE_PRIORITY_ORDER.map((key, idx) => [key, idx])
);

// Резолвит строку ноты в запись словаря { key, label, icon } или null.
function resolveTokenEntry(tokenStr) {
  const normalized = String(tokenStr || '').toLowerCase().trim();
  if (!normalized) return null;

  if (TOKEN_DICTIONARY[normalized]) {
    return { key: normalized, ...TOKEN_DICTIONARY[normalized] };
  }

  return null;
}

// Строит DOM-элемент тега ноты: PNG-иконка + текстовая подпись.
function buildNoteTag(tokenData) {
  const container = document.createElement('div');
  container.className = 'noteTag';

  // PNG иконка
  if (tokenData.icon) {
    const basePath = getBasePath();
    const iconFile = tokenData.icon.replace(/\.png$/i, '.png');
    const iconPath = `${basePath}assets/notes/${iconFile}`;
    const icon = document.createElement('img');
    icon.src = iconPath;
    icon.alt = tokenData.label;
    icon.className = 'noteIcon';
    container.appendChild(icon);
  }
  
  const label = document.createElement('span');
  label.textContent = tokenData.label;
  label.className = 'noteLabel';
  container.appendChild(label);
  
  return container;
}

// Удобный геттер для отображения ноты: { label, icon } или null.
function getTokenDisplay(tokenStr) {
  const token = resolveTokenEntry(tokenStr);
  if (!token) return null;
  return { label: token.label, icon: token.icon };
}

/**
 * =========================
 * 4) Data loading (configs + CSV) + caching / Загрузка данных и кэш
 * =========================
 * Источники: статические JSON-конфиги ресторанов (в /configs/) и CSV-меню
 * из Google Sheets. Всё, что загружено, кэшируется в state.cache, чтобы
 * переключение меню/языка не дёргало сеть повторно.
 */

// Низкоуровневый GET JSON без кэша браузера; бросает при HTTP-ошибке.
async function fetchJson(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
  return await res.json();
}

// Низкоуровневый GET текста (для CSV) без кэша браузера; бросает при HTTP-ошибке.
async function fetchText(url) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
  return await res.text();
}

/**
 * Определяет базовый путь приложения и КЭШИРУЕТ его в state.basePath (считается
 * один раз). Если URL содержит /winegallery/ — конфиги лежат в /winegallery/configs/,
 * иначе сервер запущен из самой папки и базовый путь — '/'.
 */
function getBasePath() {
  // Используем сохранённый basePath, если он есть
  if (state.basePath !== null) {
    return state.basePath;
  }
  
  // Определяем и сохраняем basePath один раз
  const path = window.location.pathname;
  
  // Если URL содержит /winegallery/, конфиги лежат в <префикс>/winegallery/configs/.
  // Префикс не обязан быть пустым: на GitHub Pages сайт живёт на подпути
  // (/hostera-site/winegallery/index.html), поэтому берём его из URL.
  const i = path.indexOf('/winegallery/');
  if (i >= 0) {
    state.basePath = path.slice(0, i + '/winegallery/'.length);
    return state.basePath;
  }
  
  // Если сервер запущен из папки winegallery, конфиги в /configs/
  state.basePath = '/';
  return state.basePath;
}

// Загружает индекс всех ресторанов (configs/index.json) с кэшированием.
async function loadConfigsIndex() {
  if (state.cache.configsIndex) return state.cache.configsIndex;
  const basePath = getBasePath();
  const idx = await fetchJson(`${basePath}configs/index.json`);
  state.cache.configsIndex = idx;
  return idx;
}

// Загружает JSON-конфиг конкретного ресторана (configs/<id>.json) с кэшированием.
async function loadRestaurantConfig(restaurantId) {
  if (state.cache.configByRestaurant.has(restaurantId)) return state.cache.configByRestaurant.get(restaurantId);
  const basePath = getBasePath();
  const cfg = await fetchJson(`${basePath}configs/${restaurantId}.json`);
  state.cache.configByRestaurant.set(restaurantId, cfg);
  return cfg;
}

// Загружает CSV-меню по URL с кэшированием по URL (ключ — сам URL).
async function loadCSV(csvUrl) {
  if (state.cache.csvByUrl.has(csvUrl)) return state.cache.csvByUrl.get(csvUrl);
  const text = await fetchText(csvUrl);
  state.cache.csvByUrl.set(csvUrl, text);
  return text;
}
