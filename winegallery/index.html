// --- Блок Waste-фичи (режим учёта списания) ---

// Конфиг waste-фичи из конфига ресторана (или null).
function getWasteFeatureConfig(config = state.config) {
  return config?.features?.waste || null;
}

// Включена ли waste-фича для данного ресторана.
function isWasteFeatureEnabled(config = state.config) {
  return !!getWasteFeatureConfig(config)?.enabled;
}

// Является ли ключ меню зарезервированным waste-маршрутом.
function isWasteRouteKey(menuKey) {
  return menuKey === WASTE_MENU_KEY;
}

/**
 * Приводит список меню из конфига к единому виду:
 * 1) если есть массив menus — фильтрует waste, когда фича выключена, и
 *    при включённой фиче добавляет синтетический пункт Waste, если его нет;
 * 2) если есть только config.csvUrl — оборачивает его в одно меню «Wine List»;
 * 3) иначе — пустой список.
 */
function normalizeMenus(config) {
  if (Array.isArray(config?.menus) && config.menus.length) {
    const wasteEnabled = isWasteFeatureEnabled(config);
    const menus = [...config.menus].filter((menu) => {
      if (!wasteEnabled && isWasteMenu(menu)) return false;
      return true;
    });

    const hasWaste = menus.some(m => m?.key === WASTE_MENU_KEY);
    if (wasteEnabled && !hasWaste) {
      const wasteFeature = getWasteFeatureConfig(config) || {};
      menus.push({
        key: WASTE_MENU_KEY,
        title: wasteFeature.title || 'Waste Mode',
        type: 'waste',
        layout: 'waste'
      });
    }
    return menus;
  }
  if (config?.csvUrl) {
    const menus = [{
      key: 'wine',
      title: 'Wine List',
      type: 'wine',
      layout: 'cards',
      csvUrl: config.csvUrl
    }];
    return menus;
  }
  return [];
}

// Находит объект меню по ключу в текущем списке меню.
function getMenuByKey(key) {
  return (state.menus || []).find(m => m.key === key) || null;
}

// URL CSV для языка с каскадом фолбэков: меню → ресторан → en.
function getCsvUrlForLang(lang) {
  const menuCsv = state.menuConfig?.csvUrl;
  const fallbackCsv = state.config?.csvUrl;
  const source = menuCsv || fallbackCsv || {};
  return source?.[lang] || source?.en || null;
}

// --- Определители типа/режима меню (управляют выбором layout и рендера) ---

// Является ли меню waste-режимом (по ключу/типу/layout).
function isWasteMenu(menu) {
  return !!menu && (menu.key === WASTE_MENU_KEY || menu.type === 'waste' || menu.layout === 'waste');
}

// Сейчас активно waste-меню.
function isWasteMode() {
  return isWasteMenu(state.menuConfig);
}

// Pastry и Coffee используют один и тот же плоский photo-card layout,
// маппинг строк и путь рендера.
// Pastry and Coffee share the same flat photo-card layout, row mapping and render path.
function isPastryMenu(menu) {
  if (!menu) return false;
  const key = String(menu.key || '').toLowerCase();
  const type = String(menu.type || '').toLowerCase();
  return key === 'pastry' || key === 'coffee' || type === 'pastry' || type === 'coffee';
}

// Сейчас активно pastry/coffee-меню.
function isPastryMode() {
  return isPastryMenu(state.menuConfig);
}

// Photo-card layout покрывает Pastry, Coffee и Bar. Pastry/Coffee — плоские
// (без секций); Bar добавляет табы секций сверху, но дизайн карточки и маппинг
// строк те же.
// Photo-card layout covers Pastry, Coffee and Bar. Pastry/Coffee are flat (no sections);
// Bar adds section tabs on top, otherwise same card design and row mapping.
function isPhotoCardMenu(menu) {
  if (!menu) return false;
  const key = String(menu.key || '').toLowerCase();
  const type = String(menu.type || '').toLowerCase();
  return key === 'pastry' || key === 'coffee' || key === 'bar'
      || type === 'pastry' || type === 'coffee' || type === 'bar';
}

// Расшифровка диет-бэйджей (аллергены/диеты) для подсказок на фото-карточках.
const DIET_BADGE_LABELS = { V: 'Vegetarian', VE: 'Vegan', GF: 'Gluten-Free' };

/**
 * Маппер строки CSV → объект фото-карточки (Pastry/Coffee/Bar).
 * Аналог mapWineRow, но для блюд/напитков: название/описание/цена/фото,
 * нормализованный ключ секции и бэйджи аллергенов (без 'N/A').
 */
function mapPhotoCardRow(x, idx) {
  const title = String(x['name of dish'] ?? x.name ?? x.title ?? '').trim();
  const description = String(x.description ?? '').trim();
  const rawPrice = String(x.price ?? '').replace(',', '.').trim();
  const parsedPrice = Number(rawPrice);
  const priceBottle = isFinite(parsedPrice) ? parsedPrice : '';
  const id = String(x['№'] ?? x.id ?? x.no ?? idx + 1).trim();
  const imageUrl = String(x.primary_image_url ?? x.image ?? '').trim();

  const sectionRaw = String(x.section_key ?? x.section ?? '').trim();
  const section = sectionRaw.replace(/\b\w/g, c => c.toUpperCase());
  const sectionKey = normalizeSectionKey(sectionRaw);

  const badges = [];
  for (const raw of String(x.allergies ?? '').split(',')) {
    const token = raw.trim();
    if (!token || token.toUpperCase() === 'N/A') continue;
    if (!badges.includes(token)) badges.push(token);
  }

  return {
    id,
    title,
    description,
    priceBottle,
    imageUrl,
    badges,
    section,
    sectionKey,
    searchHaystack: buildSearchHaystack([title, description]),
    raw: x,
    visible: toBool(x.visible),
    available: toBool(x.is_available),
  };
}

// --- Интеграция внешнего модуля Waste Mode (assets/js/waste-mode.js) ---
// Ленивая ссылка на инстанс модуля; создаётся один раз через фабрику.
let wasteModeModule = null;

// Показывает оболочку waste-режима (классы-маркеры на контейнерах).
function showWasteShell() {
  const appWrap = $('appWrap');
  if (appWrap) appWrap.classList.add('wasteActive');
  const wasteView = $('wasteView');
  if (wasteView) wasteView.classList.add('wmVisible');
}

// Скрывает оболочку waste-режима.
function hideWasteShell() {
  const appWrap = $('appWrap');
  if (appWrap) appWrap.classList.remove('wasteActive');
  const wasteView = $('wasteView');
  if (wasteView) wasteView.classList.remove('wmVisible');
}

// Лениво инициализирует модуль waste-режима через глобальную фабрику,
// прокидывая ему доступ к state и хелперу $. Бросает, если фабрики нет.
function getWasteModeModule() {
  if (wasteModeModule) return wasteModeModule;
  if (typeof window.createWasteModeModule !== 'function') {
    throw new Error('Waste mode module factory is not available');
  }
  wasteModeModule = window.createWasteModeModule({ getState: () => state, byId: $ });
  return wasteModeModule;
}

// Переключение на обычное винное представление: размонтирует waste-модуль
// и прячет его оболочку.
function showWineView() {
  if (wasteModeModule && typeof wasteModeModule.unmount === 'function') {
    wasteModeModule.unmount();
  }
  hideWasteShell();
}

// Прячет винное представление, показывая оболочку waste.
function hideWineView() {
  showWasteShell();
}

// Полный рендер waste-режима: прячет вино, закрывает модалку, монтирует модуль.
function renderWasteMode() {
  hideWineView();
  closeModal(false, false);
  state.modalWineId = null;

  const module = getWasteModeModule();
  module.mount();
  showWasteShell();
}

/**
 * =========================
 * Авторизация (per-restaurant, на время сессии вкладки)
 * =========================
 * Факт входа хранится в sessionStorage с ключом, привязанным к ресторану,
 * поэтому разные рестораны авторизуются независимо, а закрытие вкладки
 * сбрасывает вход.
 */

// Ключ sessionStorage для авторизации текущего ресторана.
function authStorageKey() {
  return `wg_auth_${state.restaurantId}`;
}

// Авторизован ли пользователь в текущем ресторане.
function readAuthState() {
  const key = authStorageKey();
  return sessionStorage.getItem(key) === '1';
}

// Сохраняет факт входа и роль пользователя в sessionStorage и в state.
function setAuthState(role) {
  const key = authStorageKey();
  sessionStorage.setItem(key, '1');
  sessionStorage.setItem(`${key}_role`, role || '');
  state.isAuthenticated = true;
  state.authRole = role || null;
}

// Полностью сбрасывает авторизацию текущего ресторана и возвращает светлую тему.
function clearAuthState() {
  const key = authStorageKey();
  sessionStorage.removeItem(key);
  sessionStorage.removeItem(`${key}_role`);
  state.isAuthenticated = false;
  state.authRole = null;
  resetThemeToLight();
}

/**
 * =========================
 * Экраны и брендинг старта (стартовый экран ↔ экран приложения)
 * =========================
 */

// Показывает стартовый экран (выбор меню/логин) и прячет приложение.
function showStartScreen() {
  const startScreen = $('startScreen');
  const appWrap = $('appWrap');
  if (startScreen) {
    startScreen.style.display = 'flex';
    startScreen.setAttribute('aria-hidden', 'false');
    startScreen.inert = false;
  }
  if (appWrap) appWrap.classList.add('hidden');
}

// Показывает экран приложения и прячет стартовый. Перед скрытием снимает
// фокус с элементов стартового экрана и делает его inert (для доступности).
function showAppScreen() {
  const startScreen = $('startScreen');
  if (startScreen) {
    if (startScreen.contains(document.activeElement)) {
      document.activeElement.blur();
    }
    startScreen.inert = true;
    startScreen.setAttribute('aria-hidden', 'true');
    startScreen.style.display = 'none';
  }
  
  const appWrap = $('appWrap');
  if (appWrap) {
    appWrap.classList.remove('hidden');
  }
}

/**
 * Рендерит фирменный лого-локап HOSTERA на экране логина.
 * Пытается показать картинку (webp → png через onerror), а если не
 * загрузилась — откатывается на текстовый заголовок «HOSTERA» + слоган.
 */
function renderHosteraStartLockup() {
  const startLockup = $('startLockup');
  const startTitle = $('startTitle');
  const startSubtitle = $('startSubtitle');
  const startBrand = document.querySelector('.startBrand');
  if (!startLockup || !startTitle || !startSubtitle) return;

  if (startBrand) startBrand.classList.add('hosteraLockup');

  startTitle.style.display = '';
  startTitle.textContent = 'HOSTERA';
  startSubtitle.style.display = '';
  startSubtitle.textContent = 'a new era of hospitality';

  const pngPath = normalizeAssetPath('assets/hostera-lockup.png');
  const webpPath = normalizeAssetPath('assets/hostera-lockup.webp');

  startLockup.style.display = 'none';
  startLockup.onerror = () => {
    if (startLockup.src.endsWith('hostera-lockup.webp')) {
      startLockup.src = pngPath;
      return;
    }
    startLockup.style.display = 'none';
    startTitle.style.display = '';
    startSubtitle.style.display = '';
  };
  startLockup.onload = () => {
    startLockup.style.display = 'block';
    startTitle.style.display = 'none';
    startSubtitle.style.display = 'none';
  };
  startLockup.src = webpPath;
}

/**
 * Рендерит брендинг стартового экрана в зависимости от контекста:
 * — если открыта форма логина → показываем фирменный локап HOSTERA;
 * — иначе показываем лого/название ресторана из конфига, учитывая режим
 *   logoOnly (только лого, без текста названия и подзаголовка).
 */
function renderStartBranding() {
  const logo = state.config?.branding?.logo || state.config?.logoUrl || '';
  const normalizedLogo = normalizeAssetPath(logo);
  const isLogoOnly = !!(state.config?.branding?.logoOnly);

  const startLogo = $('startLogo');
  const startLockup = $('startLockup');
  const startTitle = $('startTitle');
  const startSubtitle = $('startSubtitle');
  const loginForm = $('loginForm');
  const startBrand = document.querySelector('.startBrand');
  const startCard = document.querySelector('.startCard');

  if (loginForm && !loginForm.classList.contains('hidden')) {
    if (startBrand) startBrand.classList.remove('logoOnly');
    if (startCard) startCard.classList.remove('logoOnlyScreen');
    if (startLogo) startLogo.style.display = 'none';
    renderHosteraStartLockup();
  } else {
    if (startBrand) startBrand.classList.remove('hosteraLockup');
    if (startBrand) startBrand.classList.toggle('logoOnly', isLogoOnly);
    if (startCard) startCard.classList.toggle('logoOnlyScreen', isLogoOnly);
    if (startLogo) {
      startLogo.src = normalizedLogo;
      startLogo.style.display = 'inline-block';
    }
    if (startLockup) startLockup.style.display = 'none';
    if (startTitle) {
      startTitle.style.display = isLogoOnly ? 'none' : '';
      if (!isLogoOnly) startTitle.textContent = state.config?.name || state.restaurantId || 'HOSTERA';
    }
    if (startSubtitle) {
      startSubtitle.style.display = isLogoOnly ? 'none' : '';
      if (!isLogoOnly) startSubtitle.textContent = state.config?.branding?.subtitle || '';
    }
  }
}

/**
 * Рендер списка меню на стартовом экране (плитки выбора).
 *
 * Waste-режим сюда не попадает: списание — рабочий инструмент персонала, а не
 * раздел гостевого меню, и вход в него отдельный (маршрут /<ресторан>/waste,
 * кнопка «Open Waste Mode» в бэкофисе Hostera). Поэтому стартовый экран у всех
 * ресторанов одинаковый — плитки обычных меню.
 */
function renderMenuList() {
  const list = $('menuList');
  if (!list) return;

  list.innerHTML = '';

  const regularMenus = (state.menus || []).filter((m) => !isWasteMenu(m));

  for (const menu of regularMenus) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'menuBtn';
    btn.textContent = menuTitleForLang(menu);

    const hasCsv = !!(menu?.csvUrl?.en || menu?.csvUrl?.[state.lang]);
    if (!hasCsv) {
      btn.disabled = true;
      btn.textContent = `${menuTitleForLang(menu)} (${t('comingSoon')})`;
    }

    btn.onclick = () => enterMenu(menu.key);
    list.appendChild(btn);
  }
}

// Заполняет нативный <select> меню (фолбэк-навигация) и обновляет верхние
// табы. Держит выбранным текущее меню.
function renderMenuSelect() {
  const ms = $('menuSelect');
  if (!ms) {
    return;
  }
  ms.innerHTML = '';

  for (const menu of state.menus) {
    const opt = document.createElement('option');
    opt.value = menu.key;
    opt.textContent = menuTitleForLang(menu);
    if (menu.key === state.menuKey) opt.selected = true;
    ms.appendChild(opt);
  }

  renderTopMenuNav();
}

/**
 * Рендерит и активирует ГЛОБАЛЬНУЮ форму входа (единый логин для всех
 * ресторанов через configs/auth.json). По сабмиту: валидирует креды,
 * по логину определяет restaurantId, грузит его конфиг и тему, строит
 * список меню и переводит пользователя на экран выбора меню.
 * Неочевидно: URL НЕ меняется до выбора меню — pretty-URL вида /novikov_bh
 * заставил бы браузер перейти на несуществующую страницу (404).
 */
function renderGlobalLoginForm() {
  showStartScreen();
  const loginForm = $('loginForm');
  const loginError = $('loginError');
  const loginInput = $('loginInput');
  const passwordInput = $('passwordInput');
  
  loginForm.classList.remove('hidden');
  $('menuList').classList.add('hidden');
  
  // Safely hide restaurant selector and branding elements
  const restaurantSelector = $('restaurantSelector');
  if (restaurantSelector) restaurantSelector.style.display = 'none';
  const startBrand = document.querySelector('.startBrand');
  if (startBrand) startBrand.classList.remove('logoOnly');
  const startCard = document.querySelector('.startCard');
  if (startCard) startCard.classList.remove('logoOnlyScreen');
  
  const startLogo = $('startLogo');
  if (startLogo) startLogo.style.display = 'none';

  const startLockup = $('startLockup');
  if (startLockup) startLockup.style.display = 'none';
  renderHosteraStartLockup();
  
  loginError.textContent = '';
  loginInput.value = '';
  passwordInput.value = '';
  loginInput.placeholder = t('login');
  passwordInput.placeholder = t('password');
  applyLanguageUI();
  
  // Обработчик сабмита формы входа (переопределяется целиком при каждом рендере).
  // Remove old onsubmit handler
  loginForm.onsubmit = async (e) => {
    e.preventDefault();
    loginError.textContent = '';
    
    const login = loginInput.value?.trim() || '';
    const pass = passwordInput.value?.trim() || '';
    
    if (!login || !pass) {
      loginError.textContent = 'Please enter login and password.';
      return;
    }
    
    try {
      const user = await validateGlobalCredentials(login, pass);
      
      if (!user) {
        loginError.textContent = 'Invalid login or password.';
        return;
      }
      
      // Success - load restaurant and proceed
      state.restaurantId = user.restaurantId;
      
      // Don't change URL yet - wait until user selects a menu
      // Changing URL to Pretty URL like /novikov_bh causes browser to try loading that page (404)
      // URL will be updated when user enters a menu via enterMenu()
      state.isLoadingRestaurant = true;
      
      try {
        state.config = await loadRestaurantConfig(state.restaurantId);
      } catch (configErr) {
        console.error('[Login] Config load error:', configErr);
        loginError.textContent = 'Error loading restaurant config: ' + configErr.message;
        return;
      }
      
      applyThemeFromConfig(state.config);
      
      state.menus = normalizeMenus(state.config);
      state.menuKey = null;
      state.menuConfig = null;
      state.lang = 'en';

      applyLanguageUI();
      
      setAuthState(user.role);

      loginForm.classList.add('hidden');

      renderMenuSelect();
      bindSettingsMenu();
      bindLogoutHandler();

      $('logoutBtn').style.display = 'inline-flex';
      setStatus(t('ready'), 'good');

      const menuList = $('menuList');
      if (menuList) menuList.classList.remove('hidden');
      const startScreen = $('startScreen');
      if (startScreen) startScreen.setAttribute('aria-hidden', 'false');
      renderStartBranding();
      renderMenuList();
    } catch (err) {
      console.error('[Login] Error:', err);
      loginError.textContent = 'Error: ' + err.message;
    }
  };
}


// Требует ли конфиг ресторана локальной авторизации (есть режим local и юзеры).
function requiresAuth(config) {
  return config?.auth?.mode === 'local' && Array.isArray(config?.auth?.users) && config.auth.users.length > 0;
}

// Проверяет креды по глобальному configs/auth.json (cache-busting через ?v=time).
// Возвращает объект пользователя (с restaurantId и ролью) или null.
async function validateGlobalCredentials(login, password) {
  try {
    const basePath = getBasePath();
    const authUrl = `${basePath}configs/auth.json?v=` + Date.now();
    const authIndex = await fetchJson(authUrl);
    const user = authIndex.users?.find(u => u.login === login && u.password === password);
    return user || null;
  } catch (e) {
    console.error('[Auth] Error loading auth config:', e);
    throw e;
  }
}

// Проверка кред по локальным юзерам из конфига ресторана (per-restaurant auth).
function validateCredentials(login, password) {
  const users = state.config?.auth?.users || [];
  return users.find(u => u.login === login && u.password === password) || null;
}

/**
 * Вход в конкретное меню по ключу. Готовит state (сбрасывает поиск/секцию),
 * обновляет шапку (лого/название ресторана), переключает на экран приложения
 * и пишет URL. Для waste-меню уходит в renderWasteMode, иначе грузит вина.
 */
async function enterMenu(menuKey) {
  if (!menuKey) return;
  const wasWasteMode = isWasteMode();
  const nextMenu = getMenuByKey(menuKey);
  const nextIsWasteMode = isWasteMenu(nextMenu);
  if (!wasWasteMode && nextIsWasteMode) {
    resetWineSearchState();
  }
  if (isWasteRouteKey(menuKey) && !isWasteFeatureEnabled()) {
    showStartScreen();
    renderMenuList();
    return;
  }

  if (!nextMenu) {
    showStartScreen();
    renderMenuList();
    return;
  }

  state.menuKey = menuKey;
  state.menuConfig = nextMenu;
  state.isSearchMode = false;
  state.search = '';
  state.currentDisplaySection = '';
  $('searchInput').value = '';
  syncClearButton();

  renderMenuSelect();

  const brandLogo = state.config?.branding?.logo || state.config?.logoUrl || '';
  $('restaurantName').textContent = state.config.name || state.restaurantId;
  $('logo').src = normalizeAssetPath(brandLogo);
  $('logo').style.display = brandLogo ? 'inline-block' : 'none';

  showAppScreen();

  writeUrlParams({ menu: menuKey, w: null, section: null }, 'push');

  if (isWasteMode()) {
    renderWasteMode();
    renderTopMenuNav();
    return;
  }

  if (wasWasteMode) {
    resetWineSearchState();
  }

  showWineView();

  state.wines = [];
  await loadWinesForCurrentMenu();
  scrollToTop();
}

/**
 * Загружает и подготавливает данные для текущего меню.
 * Грузит CSV → парсит → выбирает маппер по типу меню:
 *  • photo-card (Pastry/Coffee/Bar) → mapPhotoCardRow; Pastry/Coffee плоские
 *    (секция 'all'), Bar получает реальные секции;
 *  • обычное винное меню → mapWineRow.
 * Фильтрует невалидные/скрытые строки, считает секции и запускает рендер.
 */
async function loadWinesForCurrentMenu() {
  if (isWasteMode()) {
    renderWasteMode();
    return;
  }

  if (!state.menuKey) {
    return;
  }

  const csvUrl = getCsvUrlForLang(state.lang);
  
  if (!csvUrl) {
    setStatus(t('menuNotConfigured'), 'idle');
    return;
  }

  try {
    setStatus(t('loadingWines'), 'idle');
    const csvText = await loadCSV(csvUrl);
    
    const raw = csvToObjects(csvText);

    if (isPhotoCardMenu(state.menuConfig)) {
      state.wines = raw
        .map((x, idx) => mapPhotoCardRow(x, idx))
        .filter((w) => w.id && w.title)
        .filter((w) => w.visible);

      if (isPastryMode()) {
        state.sectionsEffective = [];
        state.activeSection = 'all';
      } else {
        state.sectionsEffective = computeSectionsEffective(state.wines, state.config, state.lang);
        applyDefaultSectionSelection();
      }

      setStatus(t('ready'), 'good');
      filterAndRender();
      return;
    }

    state.wines = raw.map(mapWineRow).filter(w => w.id && w.title).filter(w => w.visible);

    state.sectionsEffective = computeSectionsEffective(state.wines, state.config, state.lang);
    applyDefaultSectionSelection();

    setStatus(t('ready'), 'good');
    filterAndRender();
    
  } catch (err) {
    console.error('[LoadWines] Error:', err);
    setStatus('Error: ' + err.message, 'idle');
  }
}

/**
 * Переключение меню ВНУТРИ приложения (вкладки в шапке), в отличие от
 * enterMenu (вход со стартового экрана). Сбрасывает секцию/поиск, закрывает
 * модалку, обновляет URL (кроме случая popstate — навигация «назад/вперёд»,
 * тогда URL уже актуален) и грузит данные нового меню.
 */
async function setMenu(nextMenuKey, opts = {}) {
  const { fromPopstate = false } = opts;
  if (!nextMenuKey || nextMenuKey === state.menuKey) return;
  const wasWasteMode = isWasteMode();
  const nextMenu = getMenuByKey(nextMenuKey);
  const nextIsWasteMode = isWasteMenu(nextMenu);
  if (!wasWasteMode && nextIsWasteMode) {
    resetWineSearchState();
  }

  if (isWasteRouteKey(nextMenuKey) && !isWasteFeatureEnabled()) {
    state.menuKey = null;
    state.menuConfig = null;
    showStartScreen();
    $('menuList').classList.remove('hidden');
    renderMenuList();
    if (!fromPopstate) writeUrlParams({ menu: null, w: null, section: null }, 'push');
    return;
  }

  if (!nextMenu) {
    state.menuKey = null;
    state.menuConfig = null;
    showStartScreen();
    $('menuList').classList.remove('hidden');
    renderMenuList();
    return;
  }

  state.menuKey = nextMenuKey;
  state.menuConfig = nextMenu;
  state.activeSection = '';
  state.activeSubsection = '';
  
  // Clear search mode when switching menus
  state.isSearchMode = false;
  state.search = '';
  state.currentDisplaySection = '';
  $('searchInput').value = '';
  syncClearButton();

  renderMenuSelect();

  showAppScreen();

  closeModal(false, false);
  state.modalWineId = null;

  if (!fromPopstate) {
    writeUrlParams({ menu: nextMenuKey, w: null, section: null }, 'push');
  }

  if (isWasteMode()) {
    renderWasteMode();
    return;
  }

  if (wasWasteMode) {
    resetWineSearchState();
  }

  showWineView();

  await loadWinesForCurrentMenu();
  scrollToTop();
}

/**
 * =========================
 * 5) Sections logic / Логика секций и подсекций (Sprint 2.1)
 * =========================
 * Секции — это вкладки-фильтры (например, типы вин). Их состав и порядок
 * берутся из конфига (sectionsOrder), но всегда сверяются с реально
 * присутствующими в данных секциями. Особый случай — секция «by the glass»
 * (BTG), у которой подсекции строятся из колонки btg.
 */
const BTG_KEY = 'by_the_glass';
// Желаемый порядок подсекций внутри «by the glass».
const BTG_SUBSECTION_ORDER = ['Sparkling wine and Champagne', 'White wine', 'Rose wine', 'Red wine', 'Dessert wine'];

/**
 * Вычисляет итоговый список секций (ключей) для текущего меню.
 * Берёт желаемый порядок из конфига (с учётом языка) и оставляет только те
 * секции, что реально есть в данных; BTG включается лишь если есть вина «по
 * бокалам». Попутно наполняет state.sectionLabels (ключ→подпись), учитывая
 * языковые override. Если порядок задан, но не совпал ни с чем — fallback
 * на секции из данных + предупреждение в консоль.
 */
function computeSectionsEffective(wines, config, lang) {
  const labelsFromData = {};
  const keysInData = new Set();

  for (const w of wines) {
    const k = w.sectionKey || normalizeSectionKey(w.section);
    if (k) keysInData.add(k);
    if (k && !labelsFromData[k]) labelsFromData[k] = w.section;
  }

  const labelsFromConfig = {};
  const rawOrderCandidate =
    (config?.sectionsOrderByLang && lang && config.sectionsOrderByLang[lang]) ??
    config?.sectionsOrder;

  const rawOrder = Array.isArray(rawOrderCandidate) ? rawOrderCandidate : [];

  const normalizedOrder = rawOrder
    .map(x => {
      const label = String(x ?? '').trim();
      const key = normalizeSectionKey(label);
      if (key && !labelsFromConfig[key]) labelsFromConfig[key] = label;
      return key;
    })
    .filter(Boolean);

  state.sectionLabels = { ...labelsFromData, ...labelsFromConfig };

  // Применить переопределение названий секций для конкретного языка
  if (config?.sectionLabelsOverride?.[lang]) {
    const override = config.sectionLabelsOverride[lang];
    state.sectionLabels = { ...state.sectionLabels, ...override };
  }

  if (normalizedOrder.length) {
    const hasBtgWines = wines.some(w => w.btg && w.btg !== 'N/A' && w.btg !== '');
    const effective = normalizedOrder.filter(k => k === BTG_KEY ? hasBtgWines : keysInData.has(k));
    if (effective.length === 0 && keysInData.size > 0) {
      console.warn('[WineGallery] sectionsOrder задан, но не совпал ни с одной секцией в CSV. Показываю fallback (All + секции из данных). Проверь названия секций.');
      return Array.from(keysInData);
    }
    return effective;
  }

  return Array.from(keysInData);
}

// Разрешена ли секция к показу (есть ли она в эффективном списке секций).
function sectionAllowed(sectionKey) {
  const order = state.sectionsEffective;
  if (!order || order.length === 0) return true;
  return order.includes(sectionKey);
}

// Человекочитаемая подпись секции по её ключу (фолбэк — сам ключ).
function labelForSectionKey(k) {
  return state.sectionLabels?.[k] || k;
}

/**
 * Возвращает список подсекций для секции [{ key, label }].
 * Для BTG подсекции берутся из колонки btg и сортируются по
 * BTG_SUBSECTION_ORDER; для остальных секций — из subsectionKey/Label вин.
 */
function getSubsectionsForSection(sectionKey, wines) {
  if (sectionKey === BTG_KEY) {
    const seen = new Set();
    const result = [];
    for (const w of wines) {
      if (!w.btg || w.btg === 'N/A' || w.btg === '') continue;
      const key = normalizeSectionKey(w.btg);
      if (!seen.has(key)) { seen.add(key); result.push({ key, label: w.btg }); }
    }
    result.sort((a, b) => {
      const ia = BTG_SUBSECTION_ORDER.indexOf(a.label);
      const ib = BTG_SUBSECTION_ORDER.indexOf(b.label);
      return (ia < 0 ? 999 : ia) - (ib < 0 ? 999 : ib);
    });
    return result;
  }
  const seen = new Set();
  const result = [];
  for (const w of wines) {
    if (w.sectionKey !== sectionKey) continue;
    if (!w.subsectionKey) continue;
    if (seen.has(w.subsectionKey)) continue;
    seen.add(w.subsectionKey);
    result.push({ key: w.subsectionKey, label: w.subsectionLabel });
  }
  // Если одна подсекция совпадает с самой секцией — не показываем строку
  if (result.length === 1 && result[0].key === sectionKey) return [];
  return result;
}

/**
 * =========================
 * 6) Rendering / Рендеринг UI
 * =========================
 * Здесь живёт вся отрисовка: вкладки секций/подсекций, карточки (винные и
 * фото-карточки) и сетка с ленивой подгрузкой. Источник истины — state,
 * точка входа отрисовки контента — filterAndRender() (см. ниже).
 */

/**
 * Рендер вкладок секций и подсекций (чипы).
 * Учитывает два режима: обычный (фильтр по активной секции) и поисковый
 * (добавляется псевдо-чип «Search», секции показаны, но не применяются как
 * жёсткий фильтр). Для Pastry/Coffee вкладки скрыты (плоский список).
 */
function renderSectionButtons() {
  const tabs = $('sectionTabs');
  const subTabs = $('subsectionTabs');
  if (isPastryMode()) {
    tabs.innerHTML = '';
    tabs.classList.add('hidden');
    subTabs.innerHTML = '';
    subTabs.classList.add('hidden');
    return;
  }
  tabs.classList.remove('hidden');
  tabs.innerHTML = '';

  // Локальный конструктор чипа секции.
  const addChip = (key, label, active) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'chip' + (active ? ' active' : '');
    b.textContent = label;
    b.setAttribute('aria-pressed', active ? 'true' : 'false');
    b.onclick = () => setActiveSection(key);
    tabs.appendChild(b);
  };

  // В режиме поиска добавляем отдельный чип «Search» (показ результатов поиска).
  // Add "Search" button only if in search mode
  if (state.isSearchMode) {
    const searchBtn = document.createElement('button');
    searchBtn.type = 'button';
    searchBtn.className = 'chip' + (state.currentDisplaySection === 'search' ? ' active' : '');
    searchBtn.textContent = 'Search';
    searchBtn.setAttribute('aria-pressed', state.currentDisplaySection === 'search' ? 'true' : 'false');
    searchBtn.onclick = () => {
      state.currentDisplaySection = 'search';
      filterAndRender();
    };
    tabs.appendChild(searchBtn);

    // Show all sections in search mode but not highlighted
    for (const secKey of state.sectionsEffective) {
      addChip(secKey, labelForSectionKey(secKey), state.currentDisplaySection === secKey);
    }
  } else {
    // Normal mode: show sections and apply section filters
    for (const secKey of state.sectionsEffective) {
      addChip(secKey, labelForSectionKey(secKey), state.activeSection === secKey);
    }
  }

  // Строка подсекций: какие показывать — зависит от режима (поиск/обычный).
  // Subsection row
  let subsections = [];
  let sectionForSubsections = '';
  
  if (state.isSearchMode) {
    // In search mode: only show subsections if displaying a specific section (not 'search')
    if (state.currentDisplaySection && state.currentDisplaySection !== 'search') {
      sectionForSubsections = state.currentDisplaySection;
      subsections = getSubsectionsForSection(sectionForSubsections, state.wines);
    }
  } else {
    // Normal mode: show subsections based on active section
    sectionForSubsections = state.activeSection;
    subsections = state.activeSection
      ? getSubsectionsForSection(state.activeSection, state.wines)
      : [];
  }

  if (subsections.length > 1) {
    subTabs.classList.remove('hidden');
    subTabs.innerHTML = '';

    const addSubChip = (key, label, active) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'chip' + (active ? ' active' : '');
      b.textContent = label;
      b.setAttribute('aria-pressed', active ? 'true' : 'false');
      if (state.isSearchMode) {
        // In search mode: clicking subsection updates display
        b.onclick = () => {
          state.activeSubsection = key;
          filterAndRender();
        };
      } else {
        // Normal mode: use regular setActiveSubsection
        b.onclick = () => setActiveSubsection(key);
      }
      subTabs.appendChild(b);
    };

    for (const sub of subsections) {
      const isActive = state.isSearchMode ? state.activeSubsection === sub.key : state.activeSubsection === sub.key;
      addSubChip(sub.key, sub.label, isActive);
    }
  } else {
    subTabs.innerHTML = '';
    subTabs.classList.add('hidden');
  }
}

/**
 * Строит DOM фото-карточки (layout Photo-card: Pastry/Coffee/Bar).
 * Фото сверху (или плейсхолдер), заголовок и цена. Карточка кликабельна и
 * доступна с клавиатуры (role=button, Enter/Space → openPhotoCardModal).
 * Винные карточки строит отдельная функция buildWineCardElement.
 */
function buildCardElement(w) {
  if (isPhotoCardMenu(state.menuConfig)) {
    const card = document.createElement('div');
    card.className = 'card photoCard';
    const photo = document.createElement('div');
    photo.className = 'photoCardPhoto';
    if (w.imageUrl) {
      const img = document.createElement('img');
      img.className = 'photoCardImg';
      img.loading = 'lazy';
      img.decoding = 'async';
      img.src = w.imageUrl;
      img.alt = w.title || 'Dessert image';
      photo.appendChild(img);
    } else {
      const visual = document.createElement('div');
      visual.className = 'photoCardPlaceholder';
      visual.textContent = state.menuConfig?.title || '';
      photo.appendChild(visual);
    }
    card.appendChild(photo);
    const body = document.createElement('div');
    body.className = 'photoCardBody';
    const header = document.createElement('div');
    header.className = 'photoCardHeader';
    const titleEl = document.createElement('div');
    titleEl.className = 'photoCardTitle';
    titleEl.textContent = safe(w.title);
    header.appendChild(titleEl);
    if (safe(w.priceBottle)) {
      const priceValue = document.createElement('span');
      priceValue.className = 'photoCardPrice';
      priceValue.textContent = money(w.priceBottle).replace('$ ', '$');
      header.appendChild(priceValue);
    }
    body.appendChild(header);
    card.appendChild(body);
    card.addEventListener('click', () => openPhotoCardModal(w));
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPhotoCardModal(w); }
    });
    return card;
  }
  return null;
}

/**
 * Рендер сетки карточек с ленивой подгрузкой ради отзывчивости на больших меню.
 * Первые FIRST_CHUNK карточек рисуются синхронно (быстрый первый экран),
 * остальные — порциями по REST_CHUNK через requestIdleCallback (фолбэк на
 * setTimeout). Тип карточки (винная/фото) выбирается по типу меню.
 */
function renderGrid(list) {
  const grid = $('grid');
  grid.innerHTML = '';
  const isPhotoCard = isPhotoCardMenu(state.menuConfig);
  grid.classList.toggle('photoCardGrid', isPhotoCard);

  const FIRST_CHUNK = 8;
  const REST_CHUNK = 12;
  const firstBatch = list.slice(0, FIRST_CHUNK);
  const rest = list.slice(FIRST_CHUNK);

  const frag = document.createDocumentFragment();
  for (const w of firstBatch) {
    const el = isPhotoCard ? buildCardElement(w) : buildWineCardElement(w);
    if (el) frag.appendChild(el);
  }
  grid.appendChild(frag);

  if (isPhotoCard) schedulePhotoCardTitleFit(); else scheduleWineNameFit();

  if (rest.length === 0) return;

  // Подгрузка следующей порции карточек в простое браузера, пока есть остаток.
  let offset = 0;
  function renderChunk() {
    const chunk = rest.slice(offset, offset + REST_CHUNK);
    if (chunk.length === 0) return;
    const f = document.createDocumentFragment();
    for (const w of chunk) {
      const el = isPhotoCard ? buildCardElement(w) : buildWineCardElement(w);
      if (el) f.appendChild(el);
    }
    grid.appendChild(f);
    offset += REST_CHUNK;
    if (offset < rest.length) {
      (window.requestIdleCallback || ((cb) => setTimeout(cb, 16)))(renderChunk);
    }
  }
  (window.requestIdleCallback || ((cb) => setTimeout(cb, 16)))(renderChunk);

}

/**
 * Строит DOM винной карточки (горизонтальный layout «Wine»: фото слева).
 * Собирает блок мета-данных: производитель, название, строка
 * страна|регион|винтаж, цены (бокал/бутылка), чипы вкусовых нот.
 * Класс is86 помечает недоступные позиции (ресторанный сленг «86» = нет в наличии).
 * Вся карточка — кликабельная кнопка, открывающая модалку вина.
 */
function buildWineCardElement(w) {
  const card = document.createElement('div');
  card.className = 'card';
  if (!w.available) card.classList.add('is86');

  const layout = document.createElement('div');
  layout.className = 'cardLayout';

  const bottleWrap = document.createElement('div');
  bottleWrap.className = 'bottleWrap';

  const img = document.createElement('img');
  img.className = 'bottleImg';
  img.loading = 'lazy';
  img.decoding = 'async';
  img.src = resolveBottleSrc(w.imageUrl);
  img.onerror = () => { img.src = PLACEHOLDER_BOTTLE; };
  img.alt = w.title ? `Bottle image: ${w.title}` : 'Wine bottle';
  bottleWrap.appendChild(img);

  const meta = document.createElement('div');
  meta.className = 'meta';

  if (w.producer) {
    const producerDiv = document.createElement('div');
    producerDiv.className = 'titleProducer';
    producerDiv.textContent = w.producer;
    meta.appendChild(producerDiv);
  }

  const cardName = safe(w.raw?.name);
  if (cardName) {
    const wineNameDiv = document.createElement('div');
    wineNameDiv.className = 'titleWine';
    wineNameDiv.textContent = cardName;
    meta.appendChild(wineNameDiv);
    const divider1 = document.createElement('div');
    divider1.className = 'divider';
    meta.appendChild(divider1);
  }

  const infoParts = [];
  if (w.country) infoParts.push(w.country);
  if (w.region) infoParts.push(w.region);
  if (w.raw?.vintage || w.vintage) infoParts.push(w.raw?.vintage || w.vintage);
  if (infoParts.length > 0) {
    const infoLine = document.createElement('div');
    infoLine.className = 'infoLine';
    infoParts.forEach((part, idx) => {
      if (idx > 0) {
        const sep = document.createElement('span');
        sep.className = 'sep';
        sep.textContent = '|';
        infoLine.appendChild(sep);
      }
      infoLine.appendChild(document.createTextNode(part));
    });
    meta.appendChild(infoLine);
  }

  const bottlePrice = getDisplayPrice(w.priceBottle);
  const glassPrice = getDisplayPrice(w.priceGlass);
  const hasBottle = !!bottlePrice;
  const hasGlass = !!glassPrice;
  if (hasBottle || hasGlass) {
    const priceLine = document.createElement('div');
    priceLine.className = 'priceLine';
    const appendPrice = (labelText, displayValue) => {
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = labelText;
      priceLine.appendChild(label);
      priceLine.appendChild(document.createTextNode(' '));
      const valueEl = document.createElement('span');
      valueEl.className = 'value';
      valueEl.textContent = displayValue;
      priceLine.appendChild(valueEl);
    };
    if (hasGlass) appendPrice('Glass', glassPrice);
    if (hasBottle && hasGlass) {
      const sep = document.createElement('span');
      sep.className = 'sep';
      sep.textContent = '|';
      priceLine.appendChild(sep);
    }
    if (hasBottle) appendPrice('Bottle', bottlePrice);
    meta.appendChild(priceLine);
    const divider3 = document.createElement('div');
    divider3.className = 'divider';
    meta.appendChild(divider3);
  }

  if (w.notes) {
    const notesValueWrap = document.createElement('div');
    notesValueWrap.className = 'notes';
    parseNotesChips(w.notes).forEach(tokenStr => {
      const tokenData = getTokenDisplay(tokenStr);
      if (tokenData && tokenData.icon) notesValueWrap.appendChild(buildNoteTag(tokenData));
    });
    meta.appendChild(notesValueWrap);
  }

  layout.appendChild(bottleWrap);
  layout.appendChild(meta);
  card.appendChild(layout);

  const btn = document.createElement('button');
  btn.className = 'cardBtn';
  btn.type = 'button';
  btn.setAttribute('aria-label', `Open wine: ${w.title}`);
  btn.onclick = () => openWineModal(w.id);
  card.appendChild(btn);
  return card;
}

/**
 * ГЛАВНАЯ функция отрисовки контента: применяет к state.wines все активные
 * фильтры и рисует сетку. Учитывает множество веток:
 *  • тип меню (фото-карточки vs винные) — у них разный набор фильтров;
 *  • режим поиска vs обычный режим (разные источники секции/подсекции);
 *  • спец-секция BTG (фильтр по колонке btg + подсекции);
 *  • скрытие позиций без цены и недоступных (hide86).
 * Вызывается после любой смены фильтра/поиска/секции.
 */
function filterAndRender() {
  if (isWasteMode()) return;

  let list = state.wines.slice();
  const isPhotoCard = isPhotoCardMenu(state.menuConfig);

  if (!isPhotoCard) {
    list = list.filter(w => hasAnyDisplayPrice(w));
  }

  if (state.config?.hide86) {
    list = list.filter(w => w.available);
  }

    // For photo-card menus (Pastry, Coffee, Bar): apply section + search filters
    if (isPhotoCard) {
      const q = (state.search || '').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
      if (q) {
        list = list.filter(w => {
          const hay = (w.searchHaystack || '').normalize('NFD').replace(/[̀-ͯ]/g, '');
          return hay.includes(q);
        });
        renderGrid(list);
      } else {
        if (!isPastryMode() && state.activeSection && state.activeSection !== 'all') {
          list = list.filter(w => w.sectionKey === state.activeSection);
        }
        renderSectionButtons();
        renderGrid(list);
      }
      return;
    }

    list = list.filter(w => sectionAllowed(w.sectionKey));

  const q = (state.search || '').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');

  if (state.isSearchMode) {
    // In search mode
    if (state.currentDisplaySection === 'search') {
      // Display search results from all sections
      if (q) {
        list = list.filter(w => {
          const hay = w.searchHaystack || '';
          return hay.includes(q);
        });
      }
    } else {
      // Display all wines from the selected section (ignore search query)
      if (state.currentDisplaySection === BTG_KEY) {
        list = list.filter(w => w.btg && w.btg !== 'N/A' && w.btg !== '');
        if (state.activeSubsection) {
          list = list.filter(w => normalizeSectionKey(w.btg) === state.activeSubsection);
        }
      } else if (state.currentDisplaySection) {
        list = list.filter(w => w.sectionKey === state.currentDisplaySection);
        if (state.activeSubsection) {
          list = list.filter(w => w.subsectionKey === state.activeSubsection);
        }
      }
    }
  } else {
    // Normal mode: apply section/subsection filters
    if (state.activeSection === BTG_KEY) {
      list = list.filter(w => w.btg && w.btg !== 'N/A' && w.btg !== '');
      if (state.activeSubsection) {
        list = list.filter(w => normalizeSectionKey(w.btg) === state.activeSubsection);
      }
    } else if (state.activeSection) {
      list = list.filter(w => w.sectionKey === state.activeSection);
      if (state.activeSubsection) {
        list = list.filter(w => w.subsectionKey === state.activeSubsection);
      }
    }
  }

  // Сортировка вин: сначала по фиксированному порядку секций, затем по цене
  // (по возрастанию). Фото-карточные меню (Bar) сохраняют порядок из таблицы.
  // Wine sorts by section order and then by price; photo-card menus (Bar) respect sheet order.
  if (!isPhotoCardMenu(state.menuConfig)) {
    const sectionOrder = ['sparkling', 'champagne', 'white', 'rose', 'red', 'dessert'];
    list.sort((a, b) => {
      const sectionA = String(a.sectionKey || '').toLowerCase();
      const sectionB = String(b.sectionKey || '').toLowerCase();

      const orderA = sectionOrder.indexOf(sectionA);
      const orderB = sectionOrder.indexOf(sectionB);

      const indexA = orderA >= 0 ? orderA : 999;
      const indexB = orderB >= 0 ? orderB : 999;

      if (indexA !== indexB) {
        return indexA - indexB;
      }

      // Within same section, sort by price (ascending)
      const priceA = Number(a.priceBottle) || 0;
      const priceB = Number(b.priceBottle) || 0;
      return priceA - priceB;
    });
  }

  renderSectionButtons();
  renderGrid(list);
}

/**
 * Обработчик выбора секции (клик по чипу). В режиме поиска переключает
 * показываемую секцию, не теряя поисковый запрос; в обычном режиме меняет
 * активную секцию и сбрасывает подсекцию на дефолтную. В конце синхронизирует
 * URL, закрывает модалку и перерисовывает контент.
 */
function setActiveSection(sectionKey) {
  const key = sectionKey || '';

  // If in search mode and clicking on a section
  if (state.isSearchMode && key) {
    state.currentDisplaySection = key;
    state.activeSection = key;
    state.activeSubsection = key ? (getDefaultSubsection(key) || '') : '';
    // Don't change state.search, keep the search query active
  } else if (!state.isSearchMode) {
    // Normal mode: apply regular section switching logic
    if (key && !state.sectionsEffective.includes(key)) {
      applyDefaultSectionSelection();
    } else {
      state.activeSection = key;
      state.activeSubsection = key ? (getDefaultSubsection(key) || '') : '';
    }
  }
  
  // Only read search from input if not in search mode (to preserve search in search mode)
  if (!state.isSearchMode) {
    state.search = $('searchInput').value || '';
  }
  
  state.modalWineId = null;
  syncUrl();
  closeModal(false);
  filterAndRender();
  scrollToTop();
}

// Обработчик выбора подсекции: ставит активную подсекцию и перерисовывает.
function setActiveSubsection(subKey) {
  state.activeSubsection = subKey || getDefaultSubsection(state.activeSection) || '';
  syncUrl();
  filterAndRender();
  scrollToTop();
}

/**
 * =========================
 * 7) Modal + deep-link ?w= / Модальное окно вина и глубокие ссылки
 * =========================
 * Открытие карточки вина в модалке отражается в URL (?w=<id>), поэтому на
 * вино можно дать прямую ссылку. Здесь же — блокировка скролла фона под
 * модалкой и ловушка фокуса для доступности.
 */
let searchTimer = null;
let lastFocusEl = null;
let scrollLockY = 0;

/**
 * Блокирует скролл фона под модалкой. Приём: запоминаем текущую прокрутку и
 * фиксируем body (position:fixed + top:-Y), иначе на мобильных фон «уезжал» бы
 * за модалкой. unlockBodyScroll возвращает всё обратно и восстанавливает Y.
 */
function lockBodyScroll() {
  if (document.body.classList.contains('modalOpen')) return;
  scrollLockY = window.scrollY || window.pageYOffset || 0;

  document.body.style.position = 'fixed';
  document.body.style.top = `-${scrollLockY}px`;
  document.body.style.left = '0';
  document.body.style.right = '0';
  document.body.style.width = '100%';
  document.body.style.overflowY = 'scroll';
  document.body.classList.add('modalOpen');
}

// Снимает блокировку скролла фона и (опционально) возвращает прежнюю прокрутку.
function unlockBodyScroll(restoreScroll = true) {
  if (!document.body.classList.contains('modalOpen')) return;

  const top = document.body.style.top;
  document.body.classList.remove('modalOpen');
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.left = '';
  document.body.style.right = '';
  document.body.style.width = '';
  document.body.style.overflowY = '';

  if (restoreScroll) {
    const restoreY = top ? Math.abs(parseInt(top, 10) || 0) : scrollLockY;
    window.scrollTo(0, restoreY);
  }
}

/**
 * Открывает модалку детальной карточки вина по его id.
 * Заполняет все поля (фото, производитель, название+винтаж, локация, сорт,
 * цены, чипы) и строит радар-профиль вкуса (Body/Acidity/Sweetness/Texture,
 * +Tannins для красных). Для фото-карточных меню модалка вина не нужна —
 * сразу выходим. pushHistory управляет записью в историю браузера.
 */
function openWineModal(wineId, pushHistory = true) {
  if (isPhotoCardMenu(state.menuConfig)) {
    state.modalWineId = null;
    writeUrlParams({ w: null }, 'replace');
    return;
  }

  const w = state.wines.find(x => x.id === wineId);
  if (!w) {
    setStatus('Wine not found', 'idle');
    return;
  }
  if (!hasAnyDisplayPrice(w)) {
    setStatus('Wine has no price', 'idle');
    return;
  }

  lastFocusEl = document.activeElement;
  state.modalWineId = wineId;

  const mb = $('modalBottle');
  mb.src = resolveBottleSrc(w.imageUrl);
  mb.onerror = () => { mb.src = PLACEHOLDER_BOTTLE; };

  $('modalProducer').textContent = w.producer || '';
  const nameWithVintage = [safe(w.raw?.name), safe(w.raw?.vintage)].filter(Boolean).join(' ');
  $('modalName').textContent = nameWithVintage;

  const modalVintage = $('modalVintage');
  if (modalVintage) {
    modalVintage.textContent = '';
    modalVintage.style.display = 'none';
  }
  
  const country = String(w.country ?? '').trim();
  const region = String(w.region ?? '').trim();
  const subregion = String(w.subregion ?? '').trim();
  const locationDisplay = [country, region, subregion].filter(Boolean).join(', ');
  $('modalCountry').textContent = locationDisplay;
  $('modalCountry').style.display = locationDisplay ? 'block' : 'none';

  $('modalRegion').textContent = '';
  $('modalRegion').style.display = 'none';
  
  $('modalGrape').textContent = String(w.grape ?? '').trim();
  $('modalGrape').style.display = String(w.grape ?? '').trim() ? 'block' : 'none';

  const modalPrice = $('modalPrice');
  modalPrice.innerHTML = '';
  modalPrice.style.display = 'none';

  const modalChips = $('modalChips');
  modalChips.innerHTML = '';
  modalChips.style.display = 'none';

  // Профиль вкуса: строим строки-шкалы (label + диапазон + значение 0..100).
  const modalProfile = $('modalProfile');
  modalProfile.innerHTML = '';
  const profile = getWineProfile(w);
  const rows = [
    { label: 'Body', left: 'Light', right: 'Full', value: profile.body },
    { label: 'Acidity', left: 'Soft', right: 'Bright', value: profile.acidity },
    { label: 'Sweetness', left: 'Dry', right: 'Sweet', value: profile.sweetness },
    { label: 'Texture', left: profile.textureLabel[0], right: profile.textureLabel[1], value: profile.texture }
  ];
  if (profile.tannins !== undefined) {
    rows.push({ label: 'Tannins', left: 'Supple', right: 'Grippy', value: profile.tannins });
  }
  for (const r of rows) {
    const row = document.createElement('div');
    row.className = 'profileRow';

    const label = document.createElement('div');
    label.className = 'profileLabel';
    const name = document.createElement('span');
    name.textContent = r.label;
    const range = document.createElement('span');
    range.textContent = `${r.left} — ${r.right}`;
    label.appendChild(name);
    label.appendChild(range);

    const track = document.createElement('div');
    track.className = 'profileTrack';

    const marker = document.createElement('div');
    marker.className = 'profileMarker';
    marker.style.left = `${Math.max(0, Math.min(100, r.value))}%`;

    track.appendChild(marker);
    row.appendChild(label);
    row.appendChild(track);
    modalProfile.appendChild(row);
  }

  const descText = String(w.description ?? '').trim();
  const modalDesc = $('modalDesc');
  modalDesc.textContent = descText;
  modalDesc.style.display = descText ? 'block' : 'none';

  // Блок гастро-пар (pairing) показывается ТОЛЬКО для ресторана PeopleTalk
  // (кастомная фича одного клиента, Task 5.1).
  // Pairing только для PeopleTalk (Task 5.1)
  const pairingEl = $('modalPairing');
  if (state.restaurantId === 'peopletalk' && safe(w.pairing)) {
    const items = buildPairingList(w.pairing);
    pairingEl.textContent = items.length ? `🍽️ Pairing: ${items.join(' · ')}` : '';
    pairingEl.style.display = items.length ? 'block' : 'none';
  } else {
    pairingEl.style.display = 'none';
  }

  const mn = $('modalNotes');
  mn.innerHTML = '';
  mn.style.display = 'none';

  // Показываем модалку и блокируем фон. Класс .open ставится в следующем кадре,
  // чтобы сработала CSS-анимация появления; фокус уводим на кнопку закрытия.
  const modalBack = $('modalBack');
  modalBack.style.display = 'flex';
  lockBodyScroll();

  requestAnimationFrame(() => {
    modalBack.classList.add('open');
    setTimeout(() => { $('closeModalBtn').focus(); }, 50);
  });

  if (pushHistory) syncUrl('push');
  else syncUrl('replace');

  scheduleWineNameFit();
  filterAndRender();
}

/**
 * Закрывает модалку вина: снимает класс .open (анимация), разблокирует фон,
 * по флагу sync чистит ?w= в URL, и через таймаут (после анимации) прячет
 * элемент и возвращает фокус на ранее активный элемент.
 */
function closeModal(sync=true, restoreScroll=true) {
  const back = $('modalBack');
  const wasOpen = back.style.display === 'flex';
  back.classList.remove('open');
  unlockBodyScroll(restoreScroll);

  if (sync) {
    state.modalWineId = null;
    writeUrlParams({ w: null });
  }

  if (!wasOpen) return;

  setTimeout(() => {
    back.style.display = 'none';
    if (lastFocusEl && typeof lastFocusEl.focus === 'function') {
      lastFocusEl.focus();
    } else {
      const si = $('searchInput');
      if (si) si.focus();
    }
    lastFocusEl = null;
  }, 310);
}

// Закрытие модалки вина по клику на фон (overlay) или по кнопке-крестику.
$('modalBack').addEventListener('click', (e) => {
  if (e.target === $('modalBack')) closeModal(true);
});
$('closeModalBtn').addEventListener('click', () => closeModal(true));

/* ===== Photo-card modal / Модалка фото-карточки (Pastry/Coffee/Bar) ===== */
let pcLastFocusEl = null;

/**
 * Открывает модалку фото-карточки (блюдо/напиток): большое фото или
 * плейсхолдер, заголовок, цена, описание и диет-бэйджи (аллергены).
 * Отдельна от модалки вина, т.к. набор полей и вёрстка другие.
 */
function openPhotoCardModal(item) {
  pcLastFocusEl = document.activeElement;

  const img = $('pcModalImg');
  const placeholder = $('pcModalPlaceholder');

  if (item.imageUrl) {
    img.src = item.imageUrl;
    img.alt = item.title || '';
    img.style.display = 'block';
    placeholder.style.display = 'none';
  } else {
    img.src = '';
    img.style.display = 'none';
    placeholder.textContent = state.menuConfig?.title || '';
    placeholder.style.display = 'flex';
  }

  $('pcModalTitle').textContent = safe(item.title);

  const priceEl = $('pcModalPrice');
  const priceStr = safe(item.priceBottle) ? money(item.priceBottle).replace('$ ', '$') : '';
  if (priceStr) {
    priceEl.textContent = priceStr;
    priceEl.style.display = 'inline-flex';
  } else {
    priceEl.style.display = 'none';
  }

  const descEl = $('pcModalDesc');
  const dividerEl = $('pcModalDivider');
  const descText = safe(item.description).trim();
  if (descText) {
    descEl.textContent = descText;
    descEl.style.display = 'block';
    dividerEl.style.display = 'block';
  } else {
    descEl.style.display = 'none';
    dividerEl.style.display = 'none';
  }

  const badgesEl = $('pcModalBadges');
  badgesEl.innerHTML = '';
  if (Array.isArray(item.badges) && item.badges.length) {
    for (const badge of item.badges) {
      const b = document.createElement('span');
      b.className = 'dietaryBadge';
      b.textContent = DIET_BADGE_LABELS[badge.toUpperCase()] || badge;
      badgesEl.appendChild(b);
    }
    badgesEl.style.display = 'flex';
  } else {
    badgesEl.style.display = 'none';
  }

  const back = $('pcModalBack');
  back.style.display = 'flex';
  back.removeAttribute('aria-hidden');
  lockBodyScroll();

  requestAnimationFrame(() => {
    back.classList.add('open');
    setTimeout(() => { $('pcModalClose').focus(); }, 50);
  });
}

// Закрывает модалку фото-карточки (с анимацией) и возвращает фокус.
function closePhotoCardModal() {
  const back = $('pcModalBack');
  back.classList.remove('open');
  back.setAttribute('aria-hidden', 'true');
  unlockBodyScroll();
  setTimeout(() => {
    back.style.display = 'none';
  }, 270);
  if (pcLastFocusEl && typeof pcLastFocusEl.focus === 'function') {
    pcLastFocusEl.focus();
    pcLastFocusEl = null;
  }
}

// Закрытие фото-модалки: крестик, клик по фону, либо клавиша Escape.
$('pcModalClose').addEventListener('click', closePhotoCardModal);
$('pcModalBack').addEventListener('click', (e) => {
  if (e.target === $('pcModalBack')) closePhotoCardModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && $('pcModalBack').classList.contains('open')) {
    e.preventDefault();
    closePhotoCardModal();
  }
});

// Открыта ли модалка вина прямо сейчас.
function isModalOpen() {
  return $('modalBack').style.display === 'flex';
}

// Список фокусируемых элементов внутри модалки (для focus trap, см. ниже).
function getFocusableInModal() {
  const modal = $('modalBack').querySelector('.modal');
  return Array.from(modal.querySelectorAll(
    'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
  )).filter(el => !el.hasAttribute('disabled') && el.offsetParent !== null);
}

/* Единый обработчик клавиатуры для модалки вина: Escape закрывает,
   Tab/Shift+Tab зацикливает фокус внутри модалки (focus trap для доступности). */
/* (2) one keydown handler: ESC + focus trap */
document.addEventListener('keydown', (e) => {
  if (!isModalOpen()) return;

  if (e.key === 'Escape') {
    e.preventDefault();
    closeModal(true);
    return;
  }

  if (e.key !== 'Tab') return;

  const focusables = getFocusableInModal();
  if (!focusables.length) return;

  const first = focusables[0];
  const last = focusables[focusables.length - 1];

  if (e.shiftKey && document.activeElement === first) {
    e.preventDefault();
    last.focus();
    return;
  }

  if (!e.shiftKey && document.activeElement === last) {
    e.preventDefault();
    first.focus();
    return;
  }
});

/**
 * =========================
 * 8) Search debounce / Поиск с дебаунсом
 * =========================
 * Поиск работает в отдельном «режиме поиска»: при вводе запоминается текущая
 * секция, чипы перестраиваются, а результаты ищутся по searchHaystack. Очистка
 * поля возвращает в обычный режим к секции по умолчанию.
 */

// Вход в режим поиска: запоминаем текущую секцию, чтобы вернуться к ней потом.
function enterSearchMode() {
  if (!state.isSearchMode) {
    state.isSearchMode = true;
    // Save current section before entering search mode
    state.sectionBeforeSearch = state.activeSection;
    state.currentDisplaySection = 'search';
  }
}

// Выход из режима поиска: чистим запрос и возвращаемся к секции по умолчанию.
function exitSearchMode() {
  if (state.isSearchMode) {
    state.isSearchMode = false;
    state.search = '';
    state.currentDisplaySection = '';
    // Go back to default section with its first subsection
    state.activeSection = state.sectionsEffective[0] || '';
    state.activeSubsection = state.activeSection ? (getDefaultSubsection(state.activeSection) || '') : '';
  }
}

// Реакция на ввод в поле поиска с дебаунсом 250мс: входит/выходит из режима
// поиска в зависимости от наличия запроса и перерисовывает результаты.
function onSearchDebounced() {
  syncClearButton();
  if (searchTimer) clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.search = $('searchInput').value || '';
    const q = (state.search || '').trim();
    
    if (q) {
      // Enter search mode when user types
      enterSearchMode();
    } else {
      // Exit search mode when search is cleared
      exitSearchMode();
    }
    
    filterAndRender();
  }, 250);
}
$('searchInput').addEventListener('input', onSearchDebounced);

/**
 * Плавная прокрутка наверх со своей анимацией (easeOutCubic через rAF).
 * Своя реализация вместо CSS scroll-behavior — ради надёжной работы в Safari
 * (см. историю коммитов: нативный smooth-scroll там вёл себя нестабильно).
 */
function scrollToTop(smooth = true) {
  if (!smooth || window.scrollY === 0) {
    window.scrollTo(0, 0);
    return;
  }
  const start = window.scrollY;
  const duration = Math.min(900, Math.max(500, start * 0.6));
  let startTime = null;
  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function step(now) {
    if (startTime === null) startTime = now;
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    window.scrollTo(0, start * (1 - easeOutCubic(progress)));
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// Показывает/прячет кнопку очистки поиска и схлопывает раскрытое поле,
// если оно пустое и не в фокусе.
function syncClearButton() {
  const has = !!String($('searchInput').value || '').trim();
  $('clearSearchBtn').style.display = has ? 'inline-flex' : 'none';
  const field = $('searchWrap');
  if (field && !has && document.activeElement !== $('searchInput')) {
    field.classList.remove('expanded');
    field.setAttribute('aria-expanded', 'false');
  }
}

// Раскрывает свёрнутое поле поиска (иконка → инпут) и ставит фокус.
function expandSearch() {
  const field = $('searchWrap');
  if (!field) return;
  field.classList.add('expanded');
  field.setAttribute('aria-expanded', 'true');
  $('searchInput').focus();
}

// Полная очистка поиска: сбрасывает таймер, поле, выходит из режима поиска.
function clearSearch() {
  if (searchTimer) clearTimeout(searchTimer);
  $('searchInput').value = '';
  exitSearchMode();
  $('searchInput').focus();
  syncClearButton();
  filterAndRender();
}

$('clearSearchBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  clearSearch();
});

// IIFE: навешивает поведение раскрывающегося поля поиска (клик/Enter раскрывают,
// Escape очищает и сворачивает, blur синхронизирует кнопку очистки).
(() => {
  const field = $('searchWrap');
  const input = $('searchInput');
  if (!field || !input) return;
  field.addEventListener('click', () => {
    if (field.classList.contains('expanded')) input.focus();
    else expandSearch();
  });
  field.addEventListener('keydown', (e) => {
    if ((e.key === 'Enter' || e.key === ' ') && !field.classList.contains('expanded')) {
      e.preventDefault();
      expandSearch();
    }
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      input.value = '';
      exitSearchMode();
      filterAndRender();
      input.blur();
    }
  });
  input.addEventListener('blur', () => { syncClearButton(); });
})();
$('themeToggleBtn').addEventListener('click', toggleTheme);

/* (1) removed the duplicated input listener here */

/**
 * =========================
 * 9) Boot / init / Точка входа приложения
 * =========================
 * Главный сценарий запуска: инициализация темы и sticky-отступов, загрузка
 * индекса ресторанов, разбор URL. Если ресторан в URL не указан — показываем
 * глобальный логин; иначе грузим конфиг ресторана, строим меню и
 * восстанавливаем состояние (меню/секция/открытое вино) из URL — это и есть
 * обработка deep-link при первом заходе.
 */
async function boot() {
  try {
    initTheme();
    initStickyOffsets();
    setStatus(t('loading'), 'idle');


    state.configsIndex = await loadConfigsIndex();
    const url = readRoute();

    // Если нет ресторана в URL - показать форму глобального входа
    if (!url.r) {
      showStartScreen();
      renderGlobalLoginForm();
      setStatus(t('ready'), 'good');
      return;
    }

    const defaultRestaurant = state.configsIndex?.defaultRestaurant || state.configsIndex?.restaurants?.[0]?.id;
    state.restaurantId = url.r || defaultRestaurant;

    state.config = await loadRestaurantConfig(state.restaurantId);
    applyThemeFromConfig(state.config);

    state.menus = normalizeMenus(state.config);
    state.menuKey = (url.menu && getMenuByKey(url.menu)) ? url.menu : null;
    state.menuConfig = getMenuByKey(state.menuKey);

    state.lang = 'en';

    applyLanguageUI();

    renderMenuSelect();
    bindSettingsMenu();

    const brandLogo = state.config?.branding?.logo || state.config?.logoUrl || '';
    
    $('restaurantName').textContent = state.config.name || state.restaurantId;
    $('logo').src = normalizeAssetPath(brandLogo);
    $('logo').style.display = brandLogo ? 'inline-block' : 'none';
    
    renderStartBranding();

    // Локальная авторизация ресторана (если включена): определяем, нужен ли
    // вход, и показываем форму логина либо сразу приложение.
    const needsAuth = requiresAuth(state.config);
    state.isAuthenticated = !needsAuth || readAuthState();
    const logoutBtn = $('logoutBtn');
    logoutBtn.style.display = state.isAuthenticated ? 'inline-flex' : 'none';

    const loginForm = $('loginForm');
    const loginError = $('loginError');

    loginForm.onsubmit = (e) => {
      e.preventDefault();
      loginError.textContent = '';

      const login = $('loginInput').value || '';
      const pass = $('passwordInput').value || '';
      const user = validateCredentials(login.trim(), pass.trim());

      if (!user) {
        loginError.textContent = 'Invalid login or password.';
        return;
      }

      setAuthState(user.role);
      loginForm.classList.add('hidden');
      $('menuList').classList.remove('hidden');
      renderMenuList();
      $('logoutBtn').style.display = 'inline-flex';
    };

    const ms = $('menuSelect');
    ms.onchange = async () => {
      await setMenu(ms.value);
    };

    bindLogoutHandler();

    if (needsAuth && !state.isAuthenticated) {
      showStartScreen();
      loginForm.classList.remove('hidden');
      $('menuList').classList.add('hidden');
      setStatus(t('ready'), 'good');
      return;
    }

    loginForm.classList.add('hidden');
    $('menuList').classList.remove('hidden');
    renderMenuList();

    if (!state.menuKey) {
      showStartScreen();
      $('menuList').classList.remove('hidden');
      setStatus(t('ready'), 'good');
      return;
    }

    showAppScreen();

    if (isWasteMode()) {
      renderWasteMode();
      syncUrl();
      return;
    }

    showWineView();

    const csvUrl = getCsvUrlForLang(state.lang);
    if (!csvUrl) {
      setStatus(t('menuNotConfigured'), 'idle');
      showStartScreen();
      $('menuList').classList.remove('hidden');
      return;
    }

    // Загрузка и маппинг данных стартового меню (восстановление deep-link).
    const csvText = await loadCSV(csvUrl);
    const raw = csvToObjects(csvText);

    if (isPhotoCardMenu(state.menuConfig)) {
      state.wines = raw
        .map((x, idx) => mapPhotoCardRow(x, idx))
        .filter((w) => w.id && w.title)
        .filter((w) => w.visible);

      state.sectionsEffective = [];
    } else {
      state.wines = raw.map(mapWineRow).filter(w => w.id && w.title).filter(w => w.visible);
    }

    state.sectionsEffective = computeSectionsEffective(state.wines, state.config, state.lang);

    const urlSection = url.section;
    applyDefaultSectionSelection(urlSection);

    setStatus(t('ready'), 'good');
    syncUrl();
    filterAndRender();

    // Если в URL указано конкретное вино (?w=) — сразу открываем его модалку.
    if (url.w) {
      const w = state.wines.find(x => x.id === url.w);
      if (w) {
        openWineModal(w.id, false);
      } else {
        setStatus(t('wineNotFound'), 'idle');
      }
    }

  } catch (err) {
    console.error(err);
    setStatus('Error: ' + err.message, 'idle');
  }

  // Диагностика данных в консоль: помогает на онбординге быстро понять, почему
  // меню пустое или без картинок (проверка обязательных полей и доли фото).
  const sample = state.wines[0];
  if (!sample) {
    console.warn('[WineGallery] No wines after mapping/filters. Check visible/is_available and required fields.');
  } else {
    if (isPhotoCardMenu(state.menuConfig)) return;

    const required = ['id','title','section','sectionKey','style','description','notes','imageUrl','priceBottle','priceGlass'];
    const missing = required.filter(k => !(k in sample));
    if (missing.length) console.warn('[WineGallery] Missing keys in mapped wine:', missing);

    const emptyImportant = [];
    if (!String(sample.id || '').trim()) emptyImportant.push('id');
    if (!String(sample.title || '').trim()) emptyImportant.push('title');
    if (!String(sample.sectionKey || '').trim()) emptyImportant.push('sectionKey');

    const noImgCount = state.wines.filter(w => !String(w.imageUrl || '').trim()).length;
    const imgRatio = state.wines.length ? (noImgCount / state.wines.length) : 0;

    if (emptyImportant.length) console.warn('[WineGallery] Important fields empty in sample:', emptyImportant, sample);
    if (imgRatio > 0.5) console.warn('[WineGallery] More than half wines have empty imageUrl. Check CSV column bottle_img and mapping.');
  }
}

/**
 * Обработчик навигации браузера (кнопки «назад/вперёд»).
 * Перечитывает URL и приводит состояние приложения в соответствие: смена
 * ресторана → полная перезагрузка; смена меню → setMenu(fromPopstate);
 * иначе синхронизирует секцию и открытую/закрытую модалку вина.
 * Флаг isLoadingRestaurant защищает от перезагрузки при наших же изменениях URL.
 */
window.addEventListener('popstate', () => {
  const url = readRoute();

  if (url.r && url.r !== state.restaurantId && !state.isLoadingRestaurant) {
    window.location.reload();
    return;
  }
  
  state.isLoadingRestaurant = false;

  if (!state.isAuthenticated && requiresAuth(state.config)) {
    showStartScreen();
    $('loginForm').classList.remove('hidden');
    $('menuList').classList.add('hidden');
    return;
  }

  if (!url.menu) {
    state.menuKey = null;
    state.menuConfig = null;
    showStartScreen();
    $('menuList').classList.remove('hidden');
    return;
  }

  if (url.menu && url.menu !== state.menuKey) {
    setMenu(url.menu, { fromPopstate: true });
    return;
  }

  if (isWasteMode()) {
    renderWasteMode();
    return;
  }

  showWineView();

  applyDefaultSectionSelection(url.section);

  if (url.w) {
    if (state.modalWineId !== url.w) openWineModal(url.w, false);
  } else {
    if (state.modalWineId) closeModal(false);
    state.modalWineId = null;
  }

  syncClearButton();
  renderTopMenuNav();
  filterAndRender();
});

// При ресайзе окна пересчитываем авто-подгонку заголовков карточек.
window.addEventListener('resize', () => {
  if (isWasteMode()) return;
  if (isPhotoCardMenu(state.menuConfig)) {
    schedulePhotoCardTitleFit();
  } else {
    scheduleWineNameFit();
  }
});

// Запуск приложения.
boot();
</script>

<!-- ============================================================
     PWA-обвязка: регистрация Service Worker + подсказка «На экран Домой».
     Отдельным скриптом в конце body, чтобы не мешать основному коду.
     Прогрессивное улучшение — на неподдерживающих браузерах просто ничего не делает.
     ============================================================ -->
<div class="a2hs-hint" id="a2hsHint" role="dialog" aria-live="polite" aria-label="Установка на домашний экран">
  <span class="a2hs-ico" aria-hidden="true">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 15V3"/><path d="M8 7l4-4 4 4"/>
      <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/>
    </svg>
  </span>
  <span>Установите Hostera: нажмите <b>Поделиться</b>, затем <b>«На экран „Домой“»</b>.</span>
  <button class="a2hs-close" id="a2hsClose" type="button" aria-label="Закрыть">×</button>
</div>

<script>
(function () {
  'use strict';

  // --- Регистрация Service Worker ---
  // Единое PWA Hostera: service worker лежит в корне САЙТА (не домена) — на
  // уровень выше winegallery/. Сайт живёт и в корне домена ('/'), и на подпути
  // (GitHub Pages: '/hostera-site/'), поэтому корень вычисляем относительно
  // страницы: '../' работает и для /winegallery/index.html, и для pretty-URL
  // ресторанов (/novikov_bh — один сегмент от корня сайта). Старая регистрация
  // /winegallery/sw.js снимает себя сама (kill-switch в том файле).
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      var siteRoot = new URL('../', location.href);
      navigator.serviceWorker.register(new URL('sw.js', siteRoot), { scope: siteRoot.pathname })
        .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
    });
  }

  // --- Add-to-Home-Screen подсказка для iOS Safari ---
  // У iOS нет beforeinstallprompt, поэтому показываем аккуратную инструкцию —
  // но ТОЛЬКО в Safari на iOS/iPadOS и НЕ в уже установленном standalone.
  try {
    var ua = window.navigator.userAgent;
    var isIOS = /iP(hone|od|ad)/.test(ua) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); // iPadOS 13+
    var isSafari = /^((?!chrome|android|crios|fxios|edgios|opios).)*safari/i.test(ua);
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
                       window.navigator.standalone === true;
    var DISMISS_KEY = 'hostera_a2hs_dismissed';
    var dismissed = false;
    try { dismissed = localStorage.getItem(DISMISS_KEY) === '1'; } catch (e) {}

    if (isIOS && isSafari && !isStandalone && !dismissed) {
      var hint = document.getElementById('a2hsHint');
      var closeBtn = document.getElementById('a2hsClose');
      if (hint) {
        var hide = function (persist) {
          hint.classList.remove('show');
          if (persist) { try { localStorage.setItem(DISMISS_KEY, '1'); } catch (e) {} }
        };
        // показываем с небольшой задержкой, чтобы не мешать первому впечатлению
        setTimeout(function () { hint.classList.add('show'); }, 2600);
        if (closeBtn) closeBtn.addEventListener('click', function () { hide(true); });
        // авто-скрытие через 12 c (без запоминания — покажем в следующий раз)
        setTimeout(function () { if (hint.classList.contains('show')) hide(false); }, 14600);
      }
    }
  } catch (e) { /* подсказка некритична */ }
})();
</script>
