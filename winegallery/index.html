  <!-- Бренд-шрифты Hostera (Titanium & Cognac): Inter — UI, Fraunces — serif-акцент, IBM Plex Mono — цифры/данные -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* =======================================================================
       ВСЕ СТИЛИ ПРИЛОЖЕНИЯ ИНЛАЙНОМ (single-file SPA, без сборки и внешних CSS).
       Структура файла стилей: токены дизайна → темы → базовые стили → шапка →
       поиск/настройки → вкладки → сетка → карточки → модалки → стартовый экран →
       адаптив. Дизайн-система Apple-grade: хайрлайны 1px, iOS-изинги.
       ======================================================================= */

    /* --- ДИЗАЙН-ТОКЕНЫ (светлая тема по умолчанию) ---
       Единый источник цветов/радиусов/отступов/шрифта. Все компоненты ссылаются
       на эти переменные; тему можно переопределять из JS (applyTheme/из конфига). */
    :root{
      --bg1:#F5F5F7;
      --bg2:#FFFFFF;
      --card:rgba(255, 255, 255, 0.95);
      --card2:#FFFFFF;
      --stroke:#E0E0E0;
      --stroke2:#CCCCCC;
      --text:#1C1C1E;
      --muted:#666666;
      --muted2:#6E6E73;
      --chip:#F5F5F5;
      --chipActive:#F6E9DD;
      --good:#C76B28;
      --accent:#C76B28;
      --accentSoft:#D9883F;
      --navAccent:#C76B28;
      --navActiveBg:#F6E9DD;
      --track:#EFE7DE;
      --shadow:0 2px 8px rgba(0,0,0,0.06);
      --radius:16px;
      --radius2:12px;
      --pad:24px;
      --gap:16px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-accent: 'Fraunces', Georgia, 'Times New Roman', serif;
      --font-mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace;
    }
    /* --- ТЁМНАЯ ТЕМА: переопределение тех же токенов при data-theme="dark" на <html> --- */
    :root[data-theme="dark"]{
      --bg1:#1C1C1E;
      --bg2:#1C1C1E;
      --card:rgba(44, 44, 46, 0.95);
      --card2:#2C2C2E;
      --stroke:#3A3A3C;
      --stroke2:#48484A;
      --text:#F5F5F7;
      --muted:#B0B0B0;
      --muted2:#8E8E93;
      --chip:#2C2C2E;
      --chipActive:#3A2A1B;
      --good:#D9883F;
      --accent:#D9883F;
      --accentSoft:#E5A063;
      --navAccent:#D9883F;
      --navActiveBg:#3A2A1B;
      --track:#3A342E;
      --shadow:0 2px 8px rgba(0,0,0,0.3);
    }
    /* --- БАЗОВЫЕ СТИЛИ: шрифт по умолчанию, фон/цвет страницы, сглаживание --- */
    *{
      font-family: var(--font);
    }
    body{
      margin:0;
      background: var(--bg1);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    /* --- ОСНОВНОЙ КОНТЕЙНЕР приложения (центрирование + макс. ширина) --- */
    .wrap{
      max-width:1240px;
      margin:0 auto;
      padding:22px 18px 70px;
    }
    /* =================== ШАПКА (.topbar) ===================
       Липкая шапка из трёх колонок: бренд | навигация по меню | инструменты.
       ::before рисует размытую подложку во всю ширину экрана с маской снизу. */
    .topbar{
      position: sticky;
      top: 0;
      z-index: 100;
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      gap:12px;
      padding:8px 18px;
      margin-bottom:14px;
      background:transparent;
      border:none;
      box-shadow:none;
    }
    .topbar::before{
      content:"";
      position:absolute;
      left:50%;
      margin-left:-50vw;
      width:100vw;
      top:-40px;
      bottom:-12px;
      z-index:-1;
      background: rgba(247,244,238,0.35);
      backdrop-filter: blur(6px) saturate(120%);
      -webkit-backdrop-filter: blur(6px) saturate(120%);
      -webkit-mask-image: linear-gradient(to bottom, #000 0%, #000 85%, transparent 100%);
      mask-image: linear-gradient(to bottom, #000 0%, #000 85%, transparent 100%);
      pointer-events:none;
    }
    [data-theme="dark"] .topbar::before{
      background: rgba(20,20,20,0.35);
    }
    [data-theme="dark"] .topbarBrand,
    [data-theme="dark"] .topbarNav,
    [data-theme="dark"] .topbarTools{
      background:#1c1c1e;
      border-color:rgba(255,255,255,0.2);
      box-shadow:0 6px 20px rgba(0,0,0,0.55);
    }
    [data-theme="dark"] .topMenuItem:hover:not([disabled]):not(.active),
    [data-theme="dark"] .toolBtn:hover,
    [data-theme="dark"] .searchField:hover:not(.expanded),
    [data-theme="dark"] .searchClearBtn:hover{
      background:rgba(255,255,255,0.10);
    }
    .topbarBrand,
    .topbarNav,
    .topbarTools{
      height:64px;
      box-sizing:border-box;
      background: var(--chip);
      border:1px solid rgba(0,0,0,0.15);
      border-radius:20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .topbarBrand{
      display:flex;
      align-items:center;
      gap:14px;
      justify-self:start;
      min-width:0;
      padding:0 18px 0 6px;
    }
    .topbarBrand img{
      width:52px;
      height:52px;
      border-radius:14px;
      object-fit:contain;
      background: #F2EEE6;
      border:none;
      flex-shrink:0;
    }
    .topbarBrand .title{
      display:flex;
      flex-direction:column;
      line-height:1.1;
      min-width:0;
    }
    .topbarBrand .title b{
      font-size:20px;
      font-weight:600;
      color: var(--text);
      letter-spacing:0.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    /* --- Навигация по меню в шапке (вкладки .topMenuItem) --- */
    .topbarNav{
      display:flex;
      align-items:center;
      gap:4px;
      justify-self:center;
      min-width:0;
      padding:0 6px;
      overflow-x:auto;
      scrollbar-width:none;
    }
    .topbarNav::-webkit-scrollbar{
      display:none;
    }
    .topMenuItem{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:5px;
      min-width:66px;
      padding:8px 14px;
      border:none;
      border-radius:20px;
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      transition: background-color 220ms cubic-bezier(0.2, 0, 0, 1), color 220ms cubic-bezier(0.2, 0, 0, 1);
    }
    .topMenuItem .menuIcon,
    .topMenuItem .menuIcon svg{
      width:24px;
      height:24px;
    }
    .topMenuItem .menuIcon{
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .topMenuItem .menuLabel{
      font-size:12px;
      font-weight:500;
      white-space:nowrap;
      line-height:1;
    }
    .topMenuItem:hover:not([disabled]):not(.active){
      background: var(--card);
      color: var(--text);
    }
    .topMenuItem.active{
      background:var(--navActiveBg);
      color:var(--navAccent);
    }
    .topMenuItem[disabled]{
      opacity:0.4;
      cursor:not-allowed;
    }
    .topMenuItem:focus-visible{
      outline:2px solid var(--navAccent);
      outline-offset:2px;
    }
    .topbarTools{
      display:flex;
      align-items:center;
      gap:6px;
      justify-self:end;
      position:relative;
      padding:0 8px;
    }
    /* --- Иконочные кнопки инструментов в шапке (настройки и т.п.) --- */
    .toolBtn{
      width:48px;
      height:48px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:none;
      border-radius:999px;
      background:transparent;
      color:var(--muted);
      font-size:20px;
      cursor:pointer;
      padding:0;
      transition: background-color 150ms ease, color 150ms ease;
    }
    .toolBtn:hover{
      background:var(--card);
      color:var(--text);
    }
    .toolBtn:focus-visible{
      outline:2px solid var(--navAccent);
      outline-offset:2px;
    }
    .toolBtn svg{
      width:20px;
      height:20px;
    }
    /* =================== ПОИСК (раскрывающееся поле) ===================
       В свёрнутом виде — иконка-кнопка; класс .expanded разворачивает в инпут. */
    .searchField{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      width:48px;
      height:48px;
      border-radius:999px;
      background:transparent;
      cursor:pointer;
      overflow:hidden;
      box-sizing:border-box;
      transition: width 220ms ease, background-color 150ms ease;
    }
    .searchField:hover:not(.expanded){
      background:var(--card);
    }
    .searchField.expanded{
      width:240px;
      justify-content:flex-start;
      background:transparent;
      padding:0 8px 0 14px;
      cursor:text;
    }
    .searchField:focus-visible{
      outline:2px solid var(--navAccent);
      outline-offset:2px;
    }
    .searchIco,
    .searchIco svg{
      width:20px;
      height:20px;
    }
    .searchIco{
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
    }
    .searchField #searchInput{
      flex:1;
      min-width:0;
      height:100%;
      border:none;
      background:transparent;
      outline:none;
      color:var(--text);
      font-size:15px;
      font-weight:450;
      padding:0;
      box-sizing:border-box;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .searchField:not(.expanded) #searchInput{
      display:none;
    }
    .searchField #searchInput::placeholder{
      color:var(--muted);
      opacity:1;
    }
    .searchClearBtn{
      flex-shrink:0;
      width:26px;
      height:26px;
      border:none;
      border-radius:999px;
      background:transparent;
      color:var(--muted);
      font-size:16px;
      line-height:1;
      display:none;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      padding:0;
    }
    .searchClearBtn:hover{
      background:var(--card);
      color:var(--text);
    }
    .searchClearBtn:focus-visible{
      outline:2px solid var(--navAccent);
      outline-offset:1px;
    }
    /* =================== ПАНЕЛЬ НАСТРОЕК (выпадающее меню) ===================
       Тема / назад в меню / выход. Открытие — класс .open. */
    .settingsPanel{
      position:absolute;
      top: calc(100% + 8px);
      right:0;
      min-width:170px;
      padding:6px;
      display:flex;
      flex-direction:column;
      gap:2px;
      border-radius:14px;
      border:1px solid rgba(0,0,0,0.15);
      background: rgba(255,255,255,0.85);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      backdrop-filter: blur(20px) saturate(180%);
      box-shadow: 0 10px 30px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.08);
      z-index:120;
      opacity:0;
      transform: scale(0.95) translateY(-4px);
      transform-origin: top right;
      transition: opacity 150ms cubic-bezier(0.2, 0, 0, 1), transform 150ms cubic-bezier(0.2, 0, 0, 1);
      pointer-events: none;
    }
    .settingsPanel.open{
      opacity:1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }
    [data-theme="dark"] .settingsPanel{
      background: rgba(30,30,30,0.85);
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 2px 6px rgba(0,0,0,0.3);
    }
    .settingsAction{
      display:flex;
      align-items:center;
      gap:12px;
      height:38px;
      padding:0 10px 0 12px;
      border:none;
      border-radius:8px;
      background:transparent;
      color:var(--text);
      font-size:14px;
      font-weight:500;
      text-align:left;
      cursor:pointer;
      transition: background-color 120ms ease-out;
    }
    .settingsAction:hover,
    .settingsAction:focus-visible{
      background: rgba(0,0,0,0.06);
      outline:none;
    }
    [data-theme="dark"] .settingsAction:hover,
    [data-theme="dark"] .settingsAction:focus-visible{
      background: rgba(255,255,255,0.08);
    }
    .settingsActionIcon{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:18px;
      height:18px;
      flex-shrink:0;
    }
    .settingsActionIcon svg{
      width:18px;
      height:18px;
      display:block;
    }
    .settingsThemeIcon{
      position:relative;
    }
    .settingsThemeLayer{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:0;
      transition: opacity 180ms cubic-bezier(0.2, 0, 0, 1);
    }
    .settingsThemeIcon.isLight .settingsThemeSun{ opacity:1; }
    .settingsThemeIcon.isDark .settingsThemeMoon{ opacity:1; }
    .settingsActionLabel{
      flex:1;
    }
    .settingsActionValue{
      color: var(--muted);
      font-size:13px;
      font-weight:500;
    }
    .settingsActionDestructive{
      color:#d33b3b;
    }
    [data-theme="dark"] .settingsActionDestructive{
      color:#ff5959;
    }
    .settingsActionDestructive:hover,
    .settingsActionDestructive:focus-visible{
      background: rgba(211,59,59,0.10);
    }
    [data-theme="dark"] .settingsActionDestructive:hover,
    [data-theme="dark"] .settingsActionDestructive:focus-visible{
      background: rgba(255,89,89,0.14);
    }
    .settingsDivider{
      height:1px;
      margin:6px 8px;
      background: rgba(0,0,0,0.10);
    }
    [data-theme="dark"] .settingsDivider{
      background: rgba(255,255,255,0.12);
    }
    /* --- Утилиты и legacy-контролы: скрытый класс, базовая кнопка, статус-индикатор --- */
    .hiddenControl{
      display:none !important;
    }
    .btn{
      cursor:pointer;
      border-radius: var(--radius2);
      border: 1px solid var(--stroke);
      background: var(--chip);
      color: var(--text);
      padding: 7px 10px;
      font-size: 12px;
      min-width: 100px;
    }
    .btn:hover{
      border-color: var(--stroke2);
    }
    .btn:focus-visible{
      outline:2px solid var(--accent);
      outline-offset:2px;
    }
    select, input{
      background: var(--card);
      border: 1px solid var(--stroke);
      color: var(--text);
      outline:none;
      border-radius: 12px;
      padding: 7px 10px;
      font-size: 12px;
      min-width: 100px;
    }
    .status{
      font-size: 12px;
      color: var(--muted);
      padding: 7px 10px;
      border-radius: 999px;
      border:1px solid var(--stroke);
      background: var(--card);
      display:flex;
      align-items:center;
      gap:8px;
    }
    .dot{
      width:8px;height:8px;border-radius: 999px;
      background: rgba(255,255,255,0.35);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
    }
    .dot.good{
      background: var(--good);
      box-shadow: 0 0 0 3px rgba(199,107,40,0.15);
    }

    /* =================== ВКЛАДКИ СЕКЦИЙ / ПОДСЕКЦИЙ (.chip) ===================
       Липкий под шапкой ряд чипов-фильтров; активный — .chip.active.
       top привязан к --topbar-h, который пересчитывает syncStickyOffsets(). */
    .tabs{
      position: sticky;
      top: var(--topbar-h, 80px);
      z-index: 99;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin: 12px 0 12px;
      padding: 12px 0 12px 18px;
      background: transparent;
    }
    .subsectionTabs{
      top: calc(var(--topbar-h, 80px) + var(--tabs-h, 56px));
      z-index: 98;
      margin-top: -8px;
      margin-bottom: 4px;
      padding-top: 8px;
      padding-bottom: 8px;
    }
    .subsectionTabs .chip{
      font-size: 12px;
      padding: 5px 10px;
      color: var(--muted2, #6E6E73);
    }

    [data-theme="dark"] .card{
      background: rgba(30, 30, 30, 0.95);
      border-color: #333333;
    }

    [data-theme="dark"] .card .titleProducer,
    [data-theme="dark"] .card .titleWine,
    [data-theme="dark"] .card .infoLine,
    [data-theme="dark"] .card .priceLine,
    [data-theme="dark"] .card .priceLine .label,
    [data-theme="dark"] .card .priceLine .value,
    [data-theme="dark"] .card .noteLabel{
      color: #fff;
    }

    [data-theme="dark"] .card .infoLine .sep,
    [data-theme="dark"] .card .priceLine .sep,
    [data-theme="dark"] .card .divider,
    [data-theme="dark"] .card .noteTag{
      border-color: rgba(255,255,255,0.28);
      color: rgba(255,255,255,0.72);
    }

    [data-theme="dark"] .card .divider{
      background: rgba(255,255,255,0.28);
    }

    [data-theme="dark"] .card .infoLine .sep,
    [data-theme="dark"] .card .priceLine .sep{
      color: rgba(255,255,255,0.45);
    }

    @media (max-width: 1024px){
      .topbar{ gap:10px; }
    }
    @media (max-width: 767px){
      .topbar{
        grid-template-columns: 1fr auto;
        grid-template-areas: "brand tools" "nav nav";
        gap:8px 10px;
        border-radius:24px;
      }
      .topbarBrand{ grid-area:brand; }
      .topbarBrand img{ width:44px; height:44px; }
      .topbarBrand .title{ display:none; }
      .topbarTools{ grid-area:tools; }
      .topbarNav{
        grid-area:nav;
        justify-self:stretch;
        margin-left:0;
      }
      .topMenuItem{
        flex:1;
        min-width:0;
      }
      .searchField.expanded{ width:180px; }
    }

    /* chip as button (a11y) */
    .chip{
      cursor:pointer;
      user-select:none;
      padding:7px 12px;
      border-radius: 999px;
      border:1px solid var(--stroke);
      background: var(--chip);
      color: var(--muted);
      font-size: 12px;
      transition: 0.15s ease;
      text-transform: none;

      appearance:none;
      -webkit-appearance:none;
      outline:none;
    }
    .chip:hover{
      border-color: var(--stroke2);
      color: var(--text);
    }
    .chip.active{
      background: var(--navActiveBg);
      border-color: var(--navAccent);
      color: var(--navAccent);
    }
    .chip:focus-visible{
      outline:2px solid var(--navAccent);
      outline-offset:2px;
    }

    /* =================== СЕТКА КАРТОЧЕК (.grid) ===================
       Базовая сетка винных карточек (2 колонки). .photoCardGrid — режим
       фото-карточек (другая раскладка для Pastry/Coffee/Bar). */
    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 460px));
      row-gap: 40px;
      column-gap: 72px;
      justify-content: center;
      justify-items: stretch;
      margin-top: 10px;
      padding: 0 18px;
    }
    .grid.photoCardGrid{
      grid-template-columns: repeat(3, minmax(0, 1fr));
      column-gap: 28px;
      row-gap: 32px;
      justify-items: center;
    }
    @media (max-width: 930px){
      .grid{ grid-template-columns: 1fr; }
      input{ min-width: 160px; }

      .card{ padding: 16px; }
      .card:not(.photoCard){ height: auto; }
      .cardLayout{ grid-template-columns: 1fr; gap: 16px; }
      .card:not(.photoCard) .cardLayout{ width: 100%; max-width: none; }
      .bottleWrap{ min-height: 180px; padding: 12px; }
      .bottleImg{ max-height: 160px; }

      .name{ font-size: 13px; margin-bottom: 12px; }
      .infoRow{ grid-template-columns: 75px 1fr; gap: 8px; margin-bottom: 6px; }
      .infoLabel{ font-size: 11px; }
      .infoValue{ font-size: 12px; }

      .grid.photoCardGrid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 680px){
      .card{ padding: 14px; }
      .card:not(.photoCard){ height: auto; }
      .cardLayout{ grid-template-columns: 1fr; gap: 14px; }
      .bottleWrap{ width: 100%; min-height: 160px; padding: 10px; }
      .bottleImg{ max-height: 140px; }
      .name{ font-size: 12px; }
      .infoRow{ grid-template-columns: 1fr; gap: 2px; margin-bottom: 6px; }

      .grid.photoCardGrid{ grid-template-columns: 1fr; }
    }

    /* =================== ВИННАЯ КАРТОЧКА (layout «Wine») ===================
       Горизонтальная карточка: фото бутылки слева (.bottleWrap), мета справа
       (.meta: производитель/название/инфо/цены/ноты). .cardBtn — кликовый оверлей. */
    .card{
      position:relative;
      box-sizing: border-box;
      border-radius: var(--radius);
      border:1px solid var(--stroke);
      background: var(--card);
      box-shadow: none;
      padding: 14px;
      width: 100%;
      max-width: 460px;
      min-height: auto;
      overflow:hidden;
      transition: border-color 0.2s ease;
    }
    .card:not(.photoCard){
      height: auto;
    }
    .card:hover{ border-color: var(--stroke2); }
    .cardLayout{
      display:grid;
      grid-template-columns: 84px 1fr;
      gap: 28px;
      align-items:start;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
    }
    .card:not(.photoCard) .cardLayout{
      width: calc(100% - 12px);
      max-width: 424px;
      margin: 0 auto;
    }
    .bottleWrap{
      width: 100%;
      height: auto;
      min-height: 200px;
      border-radius: var(--radius2);
      border: none;
      background: var(--bg2);
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 8px;
    }
    .bottleImg{
      max-height: 400px;
      max-width: 100%;
      object-fit: contain;
      transform: scale(1.2);
      transform-origin: center;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08));
    }
    .meta{
      flex:1;
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:0;
    }
    .head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 24px;
    }
    .name{
      font-weight: 600;
      font-size: 14px;
      letter-spacing:0.3px;
      text-align: left;
      text-transform: uppercase;
      line-height: 1.25;
      margin-bottom: 10px;
      color: var(--text);
    }
    .titleProducer{
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
    }
    .titleWine{
      font-weight: 400;
      font-size: 16px;
      letter-spacing: 0;
      color: var(--muted);
      line-height: 1.3;
      margin-bottom: 0;
      white-space: nowrap;
      overflow: hidden;
    }
    .producer{
      display: none;
    }
    .sub{
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
    }
    .cardDesc{
      font-size: 14px;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 10px;
      white-space: normal;
    }
    /* =================== ФОТО-КАРТОЧКА (layout «Photo-card») ===================
       Вертикальная карточка для Pastry/Coffee/Bar: крупное фото сверху,
       под ним заголовок и цена. Namespace .photoCard* — по соглашению проекта. */
    .photoCard{
      max-width: 400px;
      width: 100%;
      padding: 0;
      display: flex;
      flex-direction: column;
    }
    .photoCardPhoto{
      position: relative;
      flex-shrink: 0;
      width: 100%;
      aspect-ratio: 1 / 1;
      box-sizing: border-box;
      padding: 8px;
      background: var(--bg2);
      border-bottom: 1px solid var(--stroke);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photoCardImg{
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08));
    }
    .photoCardPlaceholder{
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(170deg, #f7efe4 0%, #ead8c0 100%);
      color: #8a5d2d;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    [data-theme="dark"] .photoCardPlaceholder{
      background: linear-gradient(170deg, #2a2a2c 0%, #1c1c1e 100%);
      color: #8d8d92;
    }
    .photoCardBody{
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 18px 18px;
    }
    .photoCardHeader{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }
    .photoCardTitle{
      flex: 1;
      min-width: 0;
      font-weight: 600;
      font-size: 18px;
      color: var(--text);
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
    }
    .photoCardDescription{
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
      line-height: 1.4;
      text-align: left;
    }
    .photoCardFooter{
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: auto;
      padding-top: 14px;
    }
    .photoCardPrice{
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      height: 26px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--chip);
      color: var(--good);
      border: 1px solid rgba(0,0,0,0.15);
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
    }
    [data-theme="dark"] .photoCardPrice{
      border-color: rgba(255,255,255,0.2);
    }
    .photoCardFooter .dietaryBadges{
      margin: 0;
    }
    /* --- Внутренние элементы карточек: строки инфо, цены (бокал/бутылка),
           флаги стран, диет-бэйджи, чипы вкусовых нот (.noteTag с PNG-иконкой) --- */
    .infoRow{
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .infoLabel{
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .infoValue{
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.2px;
      line-height: 1.35;
    }
    .infoLine{
      font-size: 16px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 0;
    }
    .infoLine .sep{
      color: var(--stroke2);
      margin: 0 8px;
    }
    .priceLine{
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 0;
      margin-top: 12px;
    }
    .priceLine .label{
      font-weight: 400;
      color: var(--text);
    }
    .priceLine .value{
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .priceLine .sep{
      color: var(--stroke2);
      margin: 0 10px;
    }
    .countryFlag{
      width: 28px;
      height: 20px;
      object-fit: cover;
      border: 1px solid #CCCCCC;
      margin-right: 8px;
    }
    .priceStack{
      text-align:right;
      min-width: 88px;
      line-height:1.1;
    }
    .priceBottle{
      font-family: var(--font-mono);
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
    }
    .priceGlass{
      display:block;
      font-size: 14px;
      color: var(--muted);
      font-weight: 400;
      margin-top: 4px;
    }
    .chips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .chipTag{
      font-size: 12px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: var(--chip);
      color: var(--text);
    }
    .dietaryBadges{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .dietaryBadge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:5px;
      height:26px;
      padding:0 11px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: var(--chip);
      color: var(--text);
      font-size:12px;
      font-weight:600;
      letter-spacing:0.2px;
    }
    .notes{
      display:grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(0, 1fr);
      gap:0;
      align-items:start;
      margin-top: 0;
      width: 100%;
    }
    .divider{
      height: 1px;
      background: var(--stroke);
      margin: 12px 0;
      width: calc(100% - 5px);
    }
    .noteTag{
      display:flex;
      flex-direction: column;
      align-items:center;
      gap:10px;
      padding: 0 10px;
      min-width: 0;
      border-radius: 0;
      border: none;
      border-right: 1px solid var(--stroke);
      background: transparent;
    }
    .noteTag:last-child{
      border-right: none;
    }
    .noteTag:first-child{
      padding-left: 0;
    }
    .noteIcon{
      width: 40px;
      height: 40px;
      object-fit: contain;
    }
    .noteLabel{
      font-size: 13.5px;
      font-weight: 400;
      text-transform: capitalize;
      color: var(--muted);
      white-space: nowrap;
      text-align: center;
      line-height: 1.2;
      display: block;
      overflow: visible;
      text-overflow: clip;
    }

    .cardBtn{
      position:absolute;
      inset:0;
      cursor:pointer;
      background: transparent;
      border:0;
    }
    /* =================== МОДАЛКА ВИНА ===================
       .modalBack — затемнённый оверлей с blur; .modal — само окно.
       Появление через класс .open (анимация из CSS). Внутри: фото слева,
       текст/профиль вкуса справа. */
    .modalBack{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.42);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:300;
      backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);
    }
    .modal{
      position:relative;
      width:min(783px,100%);
      height:auto;
      max-height:88vh;
      border-radius:22px;
      border:1px solid rgba(0,0,0,0.10);
      background:var(--bg1);
      box-shadow:
        0 0 0 0.5px rgba(0,0,0,0.06),
        0 8px 24px rgba(0,0,0,0.10),
        0 32px 80px rgba(0,0,0,0.28);
      overflow:hidden;
      color:var(--text);
      opacity:0;
      transform:scale(0.95) translateY(12px);
      transform-origin:center 60%;
      transition:
        opacity 300ms cubic-bezier(0.2,0,0,1),
        transform 300ms cubic-bezier(0.2,0,0,1);
      will-change:opacity,transform;
    }
    .modalBack.open .modal{
      opacity:1;
      transform:scale(1) translateY(0);
    }
    [data-theme="dark"] .modal{
      border-color:rgba(255,255,255,0.10);
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.04),
        0 8px 24px rgba(0,0,0,0.30),
        0 32px 80px rgba(0,0,0,0.60);
    }
    .modal > .closeBtn{
      position:absolute;
      top:12px;
      right:12px;
      z-index:10;
    }
    .modalBody{
      padding: 22px;
      display:grid;
      grid-template-columns: minmax(220px, 250px) 1fr;
      gap:22px;
      align-items:stretch;
      color: var(--text);
      box-sizing: border-box;
    }
    .modalLeft{
      position: relative;
      overflow: visible;
      display:flex;
      flex-direction:column;
      align-items: center;
      gap:14px;
      min-height: 0;
    }
    .modalBottleWrap{
      height: 100%;
      min-height: 324px;
      width: 100%;
      transform: none;
      padding: 0;
      display:flex;
      align-items: stretch;
      justify-content: center;
    }
    .modalBottleWrap .bottleImg,
    #modalBottle{
      width: auto;
      height: 100%;
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      object-position: center top;
      transform: none;
      transform-origin: center top;
    }
    .modalText{
      min-width:0;
      padding-left: 0;
      padding-right: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .modalProducer{
      margin: 0 0 6px 0;
      font-family: var(--font-accent);
      font-size: 30px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      opacity: 0.94;
    }
    .modalText h2{
      margin: 0 0 12px 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing:0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.95;
    }
    .modalVintage{
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--muted);
      display: none;
    }
    .modalCountry,
    .modalRegion{
      margin-bottom: 6px;
      font-size: 14px;
    }
    .modalGrape{
      margin-bottom: 30px;
      font-size: 14px;
      color: var(--text);
      opacity: 0.8;
      line-height: 1.2;
      white-space: normal;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      line-clamp: 2;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .modalSectionTitle{
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0.72;
      margin: 0 0 6px 0;
      line-height: 1.2;
      flex: 0 0 auto;
    }
    .modalSectionTitle.forDescription{
      margin-bottom: 3px;
    }
    .modalSectionDivider{
      width: 100%;
      height: 1px;
      background: color-mix(in srgb, var(--stroke) 82%, var(--text) 18%);
      margin: 8px 0 16px 0;
      opacity: 0.76;
      flex: 0 0 auto;
    }
    .modalSectionDivider.afterProfile{
      margin: 8px 0 6px 0;
    }
    .modalText .price{
      font-size: 19px;
      font-weight: 500;
      margin-bottom: 0;
      letter-spacing: 0.2px;
      line-height: 1.5;
      display:none;
    }
    .modalText .price > div{
      font-size: 19px;
      font-weight: 500;
    }
    .modalText .price small{
      display: block;
      font-size: 13px;
      font-weight: 400;
      margin-top: 2px;
      opacity: 0.6;
    }
    /* --- Профиль вкуса в модалке: шкалы Body/Acidity/... с бегунком (.profileMarker),
           позиция которого = значение 0..100 (см. openWineModal) --- */
    .modalProfile{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-bottom: 30px;
      max-width: 100%;
      flex: 0 0 auto;
    }
    .profileRow{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .profileLabel{
      font-size: 12px;
      color: var(--text);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 8px;
      padding-right: 10px;
    }
    .profileLabel span:first-child{
      color: var(--text);
      opacity: 0.8;
    }
    .profileLabel span:last-child{
      opacity: 0.92;
    }
    .profileTrack{
      position:relative;
      height: 5px;
      background: color-mix(in srgb, var(--track) 80%, var(--text) 20%);
      border-radius: 999px;
      margin-right: 10px;
    }
    .profileMarker{
      position:absolute;
      top: 50%;
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: var(--accent);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 0 3px rgba(199,107,40,0.14);
    }
    .modalText .desc{
      max-height: none;
      overflow-y: auto;
      overflow-x: hidden;
      font-size: 15px;
      line-height: 1.45;
      color: color-mix(in srgb, var(--text) 76%, var(--muted) 24%);
      text-align: left;
      -webkit-hyphens: none;
      hyphens: none;
      margin-top: 4px;
      margin-bottom: 12px;
      max-width: 100%;
      flex: 1 1 auto;
      min-height: 84px;
      max-height: 220px;
      padding-right: 8px;
      scrollbar-width: thin;
    }
    .modalText .pairing{
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--stroke);
    }
    .closeBtn{
      cursor:pointer;
      border-radius: 16px;
      border: 1px solid color-mix(in srgb, var(--stroke) 74%, transparent);
      padding: 6px 12px;
      background: color-mix(in srgb, var(--bg1) 88%, white 12%);
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      min-height: 34px;
      transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
    }
    .closeBtn:hover{
      border-color: color-mix(in srgb, var(--stroke) 52%, var(--text) 48%);
      background: color-mix(in srgb, var(--bg1) 80%, white 20%);
      transform: translateY(-1px);
    }

    .card.is86{ opacity: 1; }
    .badge86{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      background: var(--chip);
      color: var(--accent);
    }

    /* ===== Accessibility: visible focus ===== */
    :focus { outline: none; }

    :focus-visible{
      outline: none;
      outline-offset: 0;
      border-radius: 12px;
    }

    .card:focus-within{
      border-color: var(--text);
    }

    /* =================== СТАРТОВЫЙ ЭКРАН (логин + выбор меню) ===================
       Брендинг, форма входа, кнопки меню. Принудительно светлая тема. */
    /* ===== Start screen ===== */
    .startScreen{
      /* Экран логина всегда в светлой теме, независимо от data-theme */
      --bg1:#FFFFFF;
      --bg2:#FFFFFF;
      --card:#FFFFFF;
      --card2:#FFFFFF;
      --stroke:#E0E0E0;
      --stroke2:#CCCCCC;
      --text:#1C1C1E;
      --muted:#666666;
      --muted2:#6E6E73;
      --chip:#F5F5F5;
      --chipActive:#F6E9DD;
      --track:#EFE7DE;
      --shadow:0 2px 8px rgba(0,0,0,0.06);
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 20;
      background: var(--bg1);
      color: var(--text);
    }
    .startCard{
      width: min(560px, 92vw);
      background: var(--bg1);
      border: none;
      border-radius: 22px;
      padding: 28px;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .startBrand{
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: center;
    }
    .startBrand.hosteraLockup{
      width: 100%;
      justify-content: center;
      gap: 0;
      margin-bottom: 4px;
    }
    .startBrand > div{
      text-align: center;
      width: min(390px, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .startBrand.hosteraLockup > div{
      width: 100%;
      max-width: 560px;
    }
    .startBrand.logoOnly > div{
      display: none;
    }
    .startCard.logoOnlyScreen .menuList{
      margin-top: -24px;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: nowrap;
    }
    .startCard.logoOnlyScreen .menuList .menuBtn{
      width: min(240px, calc((100% - 12px) / 2));
      min-width: 0;
      flex: 0 1 auto;
      text-align: center;
      padding: 12px 16px;
    }
    .startBrand img{
      width: min(448px, 72vw);
      height: auto;
      border-radius: 14px;
      object-fit: contain;
      background: transparent;
      border: none;
    }
    .startTitle{
      font-family: var(--font-accent);
      font-size: 43px;
      font-weight: 600;
      line-height: 1.04;
      letter-spacing: 0.3px;
      text-align: center;
      width: 100%;
    }
    .startSubtitle{
      font-size: 15px;
      line-height: 1.35;
      letter-spacing: 0.2px;
      color: var(--muted);
      margin-top: 6px;
      text-transform: lowercase;
      text-align: center;
      width: 100%;
    }
    .startBrand .startLockup{
      display: none;
      width: min(336px, 65vw);
      max-width: 100%;
      height: auto;
      object-fit: contain;
      object-position: center;
      margin: 0 auto;
    }
    /* --- Форма входа и список кнопок меню на стартовом экране --- */
    .loginForm{
      width: min(336px, 65vw);
      max-width: 100%;
      margin: 0 auto;
    }
    .loginForm,
    .menuList{
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .loginForm input,
    .loginForm .btn{
      display: block;
      box-sizing: border-box;
      width: 100%;
      min-width: 0;
      height: 36px;
      font-size: 14px;
      padding: 0 12px;
    }
    .loginForm .btn{
      appearance: none;
      -webkit-appearance: none;
      margin-top: 0;
      font-weight: 500;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }
    .loginForm .btn:hover{
      background: #ececec;
      border-color: var(--stroke2);
    }
    .loginForm .btn:active{
      background: #e2e2e2;
      border-color: #cfcfcf;
    }
    .loginHint{
      margin-top: 4px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
    .menuBtn{
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: var(--bg1);
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }
    .menuBtn:hover:not([disabled]){
      background: #f7f7f7;
      border-color: var(--stroke2);
    }
    .menuBtn:active:not([disabled]){
      background: #efefef;
    }
    .menuBtn[disabled]{
      cursor: not-allowed;
      opacity: 0.5;
    }
    .formError{
      color: var(--text);
      font-size: 12px;
    }
    .noteContainer { display:none; }

    /* =================== МОДАЛКА ФОТО-КАРТОЧКИ (Pastry/Coffee/Bar) ===================
       Отдельная от винной модалки: фото + заголовок/цена/описание/бэйджи. */
    /* ===== Photo-card modal ===== */
    .pcModalBack{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.42);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:300;
      backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);
    }
    .pcModal{
      position:relative;
      width:min(480px,100%);
      border-radius:24px;
      border:1px solid rgba(0,0,0,0.10);
      background:var(--bg1);
      box-shadow:
        0 0 0 0.5px rgba(0,0,0,0.06),
        0 8px 24px rgba(0,0,0,0.10),
        0 32px 80px rgba(0,0,0,0.28);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      opacity:0;
      transform:scale(0.95) translateY(12px);
      transform-origin:center 60%;
      transition:
        opacity 300ms cubic-bezier(0.2,0,0,1),
        transform 300ms cubic-bezier(0.2,0,0,1);
      will-change:opacity,transform;
    }
    .pcModalBack.open .pcModal{
      opacity:1;
      transform:scale(1) translateY(0);
    }
    [data-theme="dark"] .pcModal{
      border-color:rgba(255,255,255,0.10);
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.04),
        0 8px 24px rgba(0,0,0,0.30),
        0 32px 80px rgba(0,0,0,0.60);
    }
    /* Header: title + price + close in one row */
    .pcModalHeader{
      display:flex;
      align-items:center;
      gap:10px;
      padding:18px 18px 14px;
      flex-shrink:0;
    }
    .pcModalTitle{
      flex:1;
      min-width:0;
      font-size:20px;
      font-weight:600;
      color:var(--text);
      line-height:1.2;
      letter-spacing:-0.3px;
      margin:0;
      white-space:normal;
      overflow:hidden;
      display:-webkit-box;
      -webkit-line-clamp:2;
      line-clamp:2;
      -webkit-box-orient:vertical;
    }
    .pcModalPrice{
      flex-shrink:0;
      display:inline-flex;
      align-items:center;
      height:28px;
      padding:0 12px;
      border-radius:999px;
      background:color-mix(in srgb,var(--good) 8%,var(--chip) 92%);
      color:var(--good);
      border:1px solid color-mix(in srgb,var(--good) 22%,transparent);
      font-size:13px;
      font-weight:600;
      letter-spacing:0.1px;
    }
    [data-theme="dark"] .pcModalPrice{
      background:color-mix(in srgb,var(--good) 14%,#1c1c1e 86%);
      border-color:color-mix(in srgb,var(--good) 30%,transparent);
    }
    .pcModalClose{
      flex-shrink:0;
      cursor:pointer;
      border-radius:999px;
      border:1px solid rgba(0,0,0,0.14);
      padding:0 14px;
      background:var(--chip);
      color:var(--text);
      font-size:12px;
      font-weight:500;
      letter-spacing:0.1px;
      height:28px;
      display:inline-flex;
      align-items:center;
      transition:
        background 150ms cubic-bezier(0.2,0,0,1),
        border-color 150ms cubic-bezier(0.2,0,0,1),
        transform 150ms cubic-bezier(0.2,0,0,1);
    }
    .pcModalClose:hover{
      border-color:rgba(0,0,0,0.26);
      transform:translateY(-1px);
    }
    [data-theme="dark"] .pcModalClose{
      border-color:rgba(255,255,255,0.16);
    }
    [data-theme="dark"] .pcModalClose:hover{
      border-color:rgba(255,255,255,0.30);
    }
    /* Image: full width, 4:3 ratio */
    .pcModalLayout{
      display:flex;
      flex-direction:column;
    }
    .pcModalImgWrap{
      position:relative;
      width:100%;
      aspect-ratio:4/3;
      background:#f5f0ea;
      border-top:1px solid rgba(0,0,0,0.08);
      border-bottom:1px solid rgba(0,0,0,0.08);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex-shrink:0;
    }
    [data-theme="dark"] .pcModalImgWrap{
      background:#1e1c1a;
      border-color:rgba(255,255,255,0.08);
    }
    .pcModalImg{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      transition:transform 300ms cubic-bezier(0.2,0,0,1);
    }
    .pcModalBack.open .pcModalImg{
      transform:scale(1.015);
    }
    .pcModalPlaceholder{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(170deg,#f7efe4 0%,#ead8c0 100%);
      color:#8a5d2d;
      font-size:11px;
      font-weight:600;
      letter-spacing:1.5px;
      text-transform:uppercase;
    }
    [data-theme="dark"] .pcModalPlaceholder{
      background:linear-gradient(170deg,#2a2a2c 0%,#1c1c1e 100%);
      color:#8d8d92;
    }
    /* Content: description + badges */
    .pcModalContent{
      display:flex;
      flex-direction:column;
      padding:16px 18px 20px;
      gap:0;
    }
    .pcModalTop{ display:none; }
    .pcModalDivider{ display:none; }
    .pcModalDesc{
      font-size:14px;
      line-height:1.6;
      color:color-mix(in srgb,var(--text) 68%,var(--muted) 32%);
      text-align:left;
      -webkit-hyphens:auto;
      hyphens:auto;
    }
    .pcModalBadges{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top:12px;
      flex-shrink:0;
    }
    /* На узких экранах фото-модалка превращается в нижний «лист» (bottom sheet). */
    @media(max-width:640px){
      .pcModalBack{ padding:0; align-items:flex-end; backdrop-filter:blur(12px) saturate(160%); -webkit-backdrop-filter:blur(12px) saturate(160%); }
      .pcModal{
        width:100%;
        max-height:94vh;
        border-radius:20px 20px 0 0;
        transform-origin:center bottom;
      }
      .pcModalHeader{ padding:14px 14px 10px; }
      .pcModalTitle{ font-size:17px; letter-spacing:-0.2px; }
      .pcModalContent{ padding:14px 14px 24px; }
    }

    /* Clickable photo-card */
    .photoCard{ cursor:pointer; }
    .photoCard:hover .photoCardPhoto{ opacity:0.92; }
    .photoCard:active{ transform:scale(0.984); }
    .photoCard{ transition:transform 140ms cubic-bezier(0.2,0,0,1); }

    /* =================== АДАПТИВ (планшет/мобайл) ===================
       Брейкпоинты 900/680/640px: модалка вина из 2 колонок становится в одну,
       уменьшаются фото и отступы, фото-модалка — bottom sheet. */
    @media (max-width: 900px){
      .modalBody{
        grid-template-columns: 1fr;
        align-items:flex-start;
      }

        height: 272px;
        min-height: 272px;

        height: auto;
        max-height: 92vh;

    }
    @media (max-width: 680px){

        height: auto;

  </style>
  <link rel="stylesheet" href="assets/css/waste-mode.css" />

  <!-- ============================================================
       PWA / iOS enhancements — аддитивно, ПОСЛЕ waste-mode.css,
       чтобы перекрывать и инлайн-стили, и waste-модуль.
       Прогрессивное улучшение: на десктопе env(safe-area)=0 → без изменений.
       Логику, токены Titanium & Cognac и темы НЕ трогаем.
       ============================================================ -->
  <style id="pwa-ios-enhancements">
    :root{
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    /* iOS-гигиена ввода: без авто-инфляции шрифта, без синей вспышки, без bounce */
    html{ -webkit-text-size-adjust: 100%; }
    body{
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }
    button, a, .chip, .toolBtn, .topMenuItem, .searchField, .searchClearBtn,
    .closeBtn, .cardBtn, .settingsAction, [role="button"]{
      touch-action: manipulation;
    }

    /* Липкая шапка / стартовый экран уважают вырез и Dynamic Island */
    .topbar{
      padding-top: calc(8px + var(--safe-top));
      padding-left: calc(18px + var(--safe-left));
      padding-right: calc(18px + var(--safe-right));
    }
    .topbar::before{ top: calc(-40px - var(--safe-top)); }
    .wrap{
      padding-left: calc(18px + var(--safe-left));
      padding-right: calc(18px + var(--safe-right));
      padding-bottom: calc(70px + var(--safe-bottom));
    }
    .tabs{ padding-left: calc(18px + var(--safe-left)); }
    .startScreen{
      padding: calc(24px + var(--safe-top)) calc(24px + var(--safe-right))
               calc(24px + var(--safe-bottom)) calc(24px + var(--safe-left));
    }

    /* Полноэкранные модалки: dvh вместо vh + safe-area + momentum-скролл */
    .modalBack{
      padding: calc(18px + var(--safe-top)) calc(18px + var(--safe-right))
               calc(18px + var(--safe-bottom)) calc(18px + var(--safe-left));
    }
    .modal{ max-height: min(88dvh, calc(100dvh - 36px - var(--safe-top) - var(--safe-bottom))); }
    .modalText .desc{ -webkit-overflow-scrolling: touch; }
    .topbarNav{ -webkit-overflow-scrolling: touch; }

    /* Тач-таргеты ≥ 44px (визуал сохраняем, растим зону нажатия) */
    .searchClearBtn{ width: 44px; height: 44px; }
    .closeBtn{ min-height: 44px; min-width: 44px; }
    .chip{ min-height: 44px; display: inline-flex; align-items: center; }
    .subsectionTabs .chip{ min-height: 36px; }
    .settingsAction{ min-height: 44px; }

    /* Waste Mode: safe-area для FAB и модалки (селекторы из waste-mode.css, файл не меняем) */
    .wm-fab{ bottom: calc(24px + var(--safe-bottom)); }
    .wm-wrap{ padding-bottom: calc(120px + var(--safe-bottom)); }
    .wm-modal-back{
      padding: calc(18px + var(--safe-top)) calc(18px + var(--safe-right))
               calc(18px + var(--safe-bottom)) calc(18px + var(--safe-left));
    }
    .wm-sheet{ max-height: min(88dvh, calc(100dvh - 36px - var(--safe-top) - var(--safe-bottom))); }

    /* Уважение к prefers-reduced-motion */
    @media (prefers-reduced-motion: reduce){
      .modal, .settingsPanel, .wm-modal-back, .wm-sheet, .topMenuItem{ transition: none !important; }
    }

    /* В standalone добавляем воздух под home-indicator в сетке */
    @media (display-mode: standalone){
      .grid{ padding-bottom: calc(24px + var(--safe-bottom)); }
    }

    /* A2HS-подсказка «Поделиться → На экран Домой» (только Safari iOS, не в standalone) */
    .a2hs-hint{
      position: fixed;
      left: 50%;
      bottom: calc(16px + var(--safe-bottom));
      transform: translateX(-50%) translateY(8px);
      z-index: 500;
      display: none;
      align-items: center;
      gap: 10px;
      max-width: min(420px, calc(100vw - 24px));
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--card2);
      color: var(--text);
      border: 1px solid var(--stroke);
      box-shadow: 0 8px 30px rgba(0,0,0,0.18);
      font-size: 13.5px;
      line-height: 1.35;
      opacity: 0;
      transition: opacity 220ms cubic-bezier(0.2,0,0,1), transform 220ms cubic-bezier(0.2,0,0,1);
    }
    .a2hs-hint.show{ display: flex; opacity: 1; transform: translateX(-50%) translateY(0); }
    .a2hs-hint .a2hs-ico{ color: var(--accent); flex-shrink: 0; }
    .a2hs-hint .a2hs-ico svg{ width: 22px; height: 22px; display: block; }
    .a2hs-hint b{ font-weight: 600; }
    .a2hs-hint .a2hs-close{
      margin-left: 4px; flex-shrink: 0;
      width: 30px; height: 30px;
      border: none; border-radius: 999px;
      background: transparent; color: var(--muted);
      font-size: 18px; line-height: 1; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      touch-action: manipulation;
    }
  </style>
</head>

<!--
  Внешние модули (единственные подключаемые скрипты, кроме инлайнового ниже):
  • waste-mode.js   — самостоятельный модуль режима списания (фабрика createWasteModeModule);
  • wine-profiles.js — база знаний вкусовых профилей по сортам (window.WineProfiles).
-->
<script src="assets/js/waste-mode.js"></script>
<script src="assets/js/wine-profiles.js"></script>
<script>
/**
 * =========================
 * 1) State / helpers
 * =========================
 */
// Короткий алиас для document.getElementById — используется по всему файлу.
const $ = (id) => document.getElementById(id);

/**
 * ГЛОБАЛЬНОЕ СОСТОЯНИЕ ПРИЛОЖЕНИЯ (single source of truth).
 * Здесь хранится ВСЁ, что нужно для отрисовки: выбранный ресторан/меню/язык,
 * загруженный конфиг, список вин, активные фильтры (секция/подсекция/поиск),
 * статус загрузки и флаги авторизации. Любой рендер читает данные отсюда.
 * Поле `cache` хранит уже загруженные конфиги и CSV, чтобы не дёргать сеть повторно.
 */
const state = {
  restaurantId: null,
  menuKey: null,
  menus: [],
  menuConfig: null,
  lang: null,
  config: null,
  configsIndex: null,
  wines: [],
  sectionsEffective: [],
  activeSection: '',
  activeSubsection: '',
  search: '',
  isLoading: false,
  status: 'Idle',
  statusType: 'idle',
  isAuthenticated: false,
  authRole: null,
  basePath: null, // Сохраняем basePath один раз при загрузке
  isLoadingRestaurant: false, // Flag to prevent reload on intentional URL change
  cache: {
    configsIndex: null,
    configByRestaurant: new Map(),
    csvByUrl: new Map(),
  },
  modalWineId: null,
  sectionLabels: {}, // key -> human label
  isSearchMode: false, // Track if we're in search mode
  sectionBeforeSearch: '', // Store which section was active before search started
  currentDisplaySection: '', // Current section being displayed (can differ from activeSection when searching)
};

// Заглушка-картинка бутылки, когда у позиции нет фото.
const PLACEHOLDER_BOTTLE = 'assets/placeholder-bottle.svg';
// Флаги «обработчик уже навешен» — защита от повторной привязки слушателей при ре-рендере.
let logoutHandlerBound = false;
let settingsMenuBound = false;
// Зарезервированный ключ меню для режима учёта списания (Waste mode).
const WASTE_MENU_KEY = 'waste_mode';

/**
 * Словарь локализации интерфейса (i18n).
 * Ключ верхнего уровня — язык ('en'/'ru'), внутри — строки UI по ключам.
 * Доступ к строкам идёт только через функцию t() ниже, не напрямую.
 */
const UI_STRINGS = {
  en: {
    all: 'All',
    search: 'Search...',
    login: 'Login',
    password: 'Password',
    signIn: 'Sign in',
    backToMenu: 'Back to Menu',
    logout: 'Logout',
    ready: 'Ready',
    loading: 'Loading...',
    loadingWines: 'Loading wines...',
    menuNotConfigured: 'Menu not configured',
    wineNotFound: 'Wine not found',
    comingSoon: 'coming soon',
  },
  ru: {
    all: 'Все',
    search: 'Поиск...',
    login: 'Логин',
    password: 'Пароль',
    signIn: 'Войти',
    backToMenu: 'Назад в меню',
    logout: 'Выйти',
    ready: 'Готово',
    loading: 'Загрузка...',
    loadingWines: 'Загрузка вин...',
    menuNotConfigured: 'Меню не настроено',
    wineNotFound: 'Вино не найдено',
    comingSoon: 'скоро',
  }
};

// Перевод строки UI по ключу. Берёт текущий язык из state, при отсутствии
// строки откатывается на английский, а затем — на сам ключ (чтобы не падать).
function t(key) {
  const lang = state?.lang || 'en';
  return UI_STRINGS[lang]?.[key] || UI_STRINGS.en?.[key] || key;
}

// Человекочитаемое название меню для текущего языка (с фолбэком на ключ меню).
function menuTitleForLang(menu) {
  if (!menu) return '';
  return menu.title || menu.key;
}

/**
 * Проставляет локализованные подписи/плейсхолдеры в уже отрисованный DOM:
 * поля поиска и логина, форму входа и т.д. Вызывается при смене языка.
 */
function applyLanguageUI() {
  const searchInput = $('searchInput');
  if (searchInput) searchInput.placeholder = t('search');

  const loginInput = $('loginInput');
  if (loginInput) loginInput.placeholder = t('login');

  const passwordInput = $('passwordInput');
  if (passwordInput) passwordInput.placeholder = t('password');

  const loginForm = $('loginForm');
  if (loginForm) {
    const signInBtn = loginForm.querySelector('button.btn');
    if (signInBtn) signInBtn.textContent = t('signIn');
  }

  const logoutBtn = $('logoutBtn');
  if (logoutBtn) logoutBtn.textContent = t('logout');

  const settingsBackToMenuBtn = $('settingsBackToMenuBtn');
  if (settingsBackToMenuBtn) {
    const lbl = settingsBackToMenuBtn.querySelector('.settingsActionLabel');
    if (lbl) lbl.textContent = t('backToMenu');
  }

  const settingsLogoutBtn = $('settingsLogoutBtn');
  if (settingsLogoutBtn) {
    const lbl = settingsLogoutBtn.querySelector('.settingsActionLabel');
    if (lbl) lbl.textContent = t('logout');
  }
}

// Есть ли у меню источник данных (CSV) для отображения.
// Для Waste-меню «доступность» определяется флагом фичи, а не наличием CSV.
function hasMenuCsv(menu) {
  if (menu?.key === WASTE_MENU_KEY || menu?.type === 'waste') {
    return isWasteFeatureEnabled();
  }
  return !!(menu?.csvUrl?.[state.lang] || menu?.csvUrl?.en);
}

// Короткая подпись пункта в верхней навигации.
// Длинное "Wine list" схлопывается в "Wine"; Waste-меню всегда "Waste".
function topMenuLabel(menu) {
  if (!menu) return '';
  if (menu.key === WASTE_MENU_KEY || menu.type === 'waste') return 'Waste';
  const title = String(menu.title || menu.key || '').trim();
  if (/wine\s+list/i.test(title)) return 'Wine';
  return title;
}

// Inline-SVG иконки для типов меню (bar/coffee/pastry/wine).
// Хранятся строками, чтобы не тянуть внешние файлы — single-file архитектура.
const MENU_ICON_SVGS = {
  bar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16l-8 8z"/><path d="M12 13v6"/><path d="M8 21h8"/></svg>',
  coffee: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h13v4a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5z"/><path d="M17 9h1.5a2.5 2.5 0 0 1 0 5H17"/><path d="M8 3v2M12 3v2"/><path d="M4 21h13"/></svg>',
  pastry: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 11h12l-1.5 9h-9z"/><path d="M5 11a7 7 0 0 1 14 0"/><path d="M12 4v1.5"/></svg>',
  wine: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h10l-1 6a4 4 0 0 1-8 0z"/><path d="M12 15v5"/><path d="M8 20h8"/></svg>',
};

// Возвращает SVG-иконку по типу меню (с фолбэком на «wine»).
function menuIconSvg(menu) {
  const type = String(menu?.type || '').toLowerCase();
  return MENU_ICON_SVGS[type] || MENU_ICON_SVGS.wine;
}

/**
 * Рендер верхней навигации по меню (вкладки Wine/Bar/Coffee/...).
 * Waste-меню сюда не попадает (фильтруется).
 * ОПТИМИЗАЦИЯ: если набор кнопок не изменился, DOM не пересоздаётся —
 * лишь переключается класс .active. Это сохраняет узлы и даёт сработать
 * CSS-анимациям перехода (иначе при innerHTML='' анимация сбрасывается).
 */
function renderTopMenuNav() {
  const nav = $('topMenuNav');
  if (!nav) return;

  const menus = (state.menus || []).filter(m => !isWasteMenu(m));
  const existing = nav.querySelectorAll('.topMenuItem');
  const canPatch = existing.length === menus.length &&
    Array.from(existing).every((btn, i) => btn.dataset.menuKey === menus[i].key);

  if (canPatch) {
    // Быстрый путь: кнопки те же — только переключаем активную (см. описание выше).
    // Same buttons, just toggle .active — preserves DOM nodes so CSS transitions fire.
    existing.forEach((btn, i) => {
      const isActive = menus[i].key === state.menuKey;
      btn.classList.toggle('active', isActive);
      if (isActive) btn.setAttribute('aria-current', 'page');
      else btn.removeAttribute('aria-current');
    });
    return;
  }

  nav.innerHTML = '';

  for (const menu of menus) {
    const isActive = menu.key === state.menuKey;
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'topMenuItem' + (isActive ? ' active' : '');
    button.dataset.menuKey = menu.key;
    if (isActive) button.setAttribute('aria-current', 'page');

    const icon = document.createElement('span');
    icon.className = 'menuIcon';
    icon.innerHTML = menuIconSvg(menu);
    const label = document.createElement('span');
    label.className = 'menuLabel';
    label.textContent = topMenuLabel(menu);
    button.appendChild(icon);
    button.appendChild(label);

    // Если у меню нет данных — кнопка неактивна и подписана «coming soon».
    const enabled = hasMenuCsv(menu);
    if (!enabled) {
      button.disabled = true;
      button.title = t('comingSoon');
    } else {
      button.onclick = async () => {
        await setMenu(menu.key);
      };
    }

    nav.appendChild(button);
  }
}

// Закрывает выпадающую панель настроек (шестерёнка) и сбрасывает ARIA-состояния.
function closeSettingsMenu() {
  const panel = $('settingsPanel');

// Синхронизирует индикатор темы в панели настроек (иконка + подпись Dark/Light)
// с реальным атрибутом data-theme на <html>.
function updateSettingsThemeIndicator() {
  const iconEl = $('settingsThemeIcon');
  const valueEl = $('settingsThemeValue');
  if (!iconEl || !valueEl) return;
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  iconEl.classList.toggle('isDark', isDark);
  iconEl.classList.toggle('isLight', !isDark);

/**
 * Навешивает все слушатели панели настроек: открытие/закрытие, переключение
 * темы, «назад в меню», «выйти», а также закрытие по клику вне панели.
 * Защищена флагом settingsMenuBound от повторной привязки.
 */
function bindSettingsMenu() {
  if (settingsMenuBound) return;

  const settingsBtn = $('settingsBtn');
  const settingsPanel = $('settingsPanel');
  const settingsThemeBtn = $('settingsThemeBtn');
  const settingsBackToMenuBtn = $('settingsBackToMenuBtn');
  const settingsLogoutBtn = $('settingsLogoutBtn');
  if (!settingsBtn || !settingsPanel || !settingsThemeBtn || !settingsBackToMenuBtn || !settingsLogoutBtn) return;

  updateSettingsThemeIndicator();

  settingsBtn.addEventListener('click', (e) => {
    e.preventDefault();
    const isOpen = settingsPanel.classList.contains('open');
    if (isOpen) {
      closeSettingsMenu();
      return;
    }
    updateSettingsThemeIndicator();
    settingsPanel.classList.add('open');
    settingsPanel.setAttribute('aria-hidden', 'false');
    settingsBtn.setAttribute('aria-expanded', 'true');
  });

  settingsThemeBtn.addEventListener('click', () => {
    toggleTheme();
    updateSettingsThemeIndicator();
  });

  settingsBackToMenuBtn.addEventListener('click', () => {
    closeSettingsMenu();
    goBackToMenuSelection();
  });

  settingsLogoutBtn.addEventListener('click', () => {
    closeSettingsMenu();
    const logoutBtn = $('logoutBtn');
    if (logoutBtn) logoutBtn.click();
  });

  document.addEventListener('click', (e) => {
    const panel = $('settingsPanel');
    const btn = $('settingsBtn');
    if (!panel || !btn) return;
    if (!panel.classList.contains('open')) return;
    if (panel.contains(e.target) || btn.contains(e.target)) return;
    closeSettingsMenu();
  });

  settingsMenuBound = true;
}

/**
 * Приводит путь к ассету к абсолютному от корня /winegallery/.
 * ВАЖНО (неочевидно): «красивые» URL ресторанов (напр. /novikov_bh) ломают
 * относительные пути — браузер резолвит assets/... как /novikov_bh/assets/...
 * Поэтому абсолютные пути и относительные пути принудительно префиксуем
 * /winegallery/. Внешние URL (http/https/data:) возвращаем как есть.
 */
function normalizeAssetPath(path) {
  if (!path) return '';
  if (path.startsWith('http://') || path.startsWith('https://') || path.startsWith('data:')) return path;

  // Корень меню НЕ обязан быть /winegallery/ от корня домена: на GitHub Pages
  // сайт живёт на подпути (/hostera-site/winegallery/). Берём префикс из
  // текущего URL; если /winegallery/ в нём нет (pretty-URL), фолбэк прежний.
  const p = window.location.pathname;
  const i = p.indexOf('/winegallery/');
  const menuRoot = i >= 0 ? p.slice(0, i + '/winegallery/'.length) : '/winegallery/';

  // Always use absolute path from the menu root since Pretty URLs can interfere with relative paths
  // For example: when URL is /novikov_bh, relative paths like assets/... become /novikov_bh/assets/
  if (path.startsWith('/')) {
    // Already absolute - check if it starts with the menu root, if not prepend it
    if (!path.startsWith(menuRoot)) {
      return menuRoot + path.slice(1);
    }
    return path;
  }

  // For relative paths like "assets/novikov-logo.png", prepend the menu root
  const fullPath = menuRoot + path;
  return fullPath;
}

/**
 * \u041f\u0440\u0435\u0432\u0440\u0430\u0449\u0430\u0435\u0442 \u043f\u0440\u043e\u0438\u0437\u0432\u043e\u043b\u044c\u043d\u043e\u0435 \u043d\u0430\u0437\u0432\u0430\u043d\u0438\u0435 \u0441\u0435\u043a\u0446\u0438\u0438 \u0432 \u0441\u0442\u0430\u0431\u0438\u043b\u044c\u043d\u044b\u0439 \u043c\u0430\u0448\u0438\u043d\u043d\u044b\u0439 \u043a\u043b\u044e\u0447:
 * \u0443\u0431\u0438\u0440\u0430\u0435\u0442 \u0434\u0438\u0430\u043a\u0440\u0438\u0442\u0438\u043a\u0443, \u043f\u0440\u0438\u0432\u043e\u0434\u0438\u0442 \u043a \u043d\u0438\u0436\u043d\u0435\u043c\u0443 \u0440\u0435\u0433\u0438\u0441\u0442\u0440\u0443 \u0438 \u0437\u0430\u043c\u0435\u043d\u044f\u0435\u0442 \u0432\u0441\u0451, \u043a\u0440\u043e\u043c\u0435
 * \u043b\u0430\u0442\u0438\u043d\u0438\u0446\u044b/\u0446\u0438\u0444\u0440, \u043d\u0430 \u00ab_\u00bb. \u041d\u0443\u0436\u0435\u043d \u0434\u043b\u044f \u0441\u043e\u043f\u043e\u0441\u0442\u0430\u0432\u043b\u0435\u043d\u0438\u044f \u0441\u0435\u043a\u0446\u0438\u0439 \u0438\u0437 CSV \u0438 \u043a\u043e\u043d\u0444\u0438\u0433\u0430.
 */
function normalizeSectionKey(input) {
  const raw = String(input ?? '').trim();
  if (!raw) return '';
  const noDiacritics = raw.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const lowered = noDiacritics.toLowerCase();
  const cleaned = lowered.replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '');
  return cleaned;
}

// Безопасное приведение к строке: null/undefined превращает в пустую строку.
function safe(v) {
  if (v === null || v === undefined) return '';
  return String(v);
}

// --- Блок работы с ценами: нормализация, проверка «нет цены», форматирование ---

// Нормализует сырое значение цены: заменяет неразрывные пробелы и обрезает края.
function normalizePriceRaw(v) {
  return String(v ?? '')
    .replace(/\u00A0/g, ' ')
    .trim();
}

// Считается ли цена «отсутствующей»: пусто или маркеры вроде n/a, null, '-' и т.п.
function isMissingPrice(v) {
  const raw = normalizePriceRaw(v);
  if (!raw) return true;
  const key = raw.toLowerCase();
  return key === 'n/a' || key === 'na' || key === 'null' || key === 'none' || key === '-' || key === '--';
}

// Готовая к показу цена (отформатированная) или пустая строка, если цены нет.
function getDisplayPrice(v) {
  if (isMissingPrice(v)) return '';
  return money(normalizePriceRaw(v));
}

// Есть ли что показывать в одном поле цены.
function hasDisplayPrice(v) {
  return !!getDisplayPrice(v);
}

// Есть ли у вина хоть какая-то цена — за бутылку или за бокал.
function hasAnyDisplayPrice(w) {
  return hasDisplayPrice(w?.priceBottle) || hasDisplayPrice(w?.priceGlass);
}

// --- Блок авто-подгонки текста в одну строку (борьба с переносами в карточках) ---
let wineNameFitRaf = null;

/**
 * Подгоняет шрифт элементов так, чтобы текст влез в одну строку без обрезки.
 * Стратегия в три шага: сначала уменьшаем размер до preferredMin, затем
 * поджимаем межбуквенный интервал, и только в крайнем случае уменьшаем
 * размер дальше до floorMin. Сравнение идёт по scrollWidth > clientWidth.
 */
function fitSingleLineElements(elements, maxFont, preferredMin, floorMin) {
  for (const el of elements) {
    el.style.fontSize = `${maxFont}px`;
    el.style.letterSpacing = '0px';
    el.style.whiteSpace = 'nowrap';

    let size = maxFont;
    while (el.scrollWidth > el.clientWidth && size > preferredMin) {
      size -= 0.5;
      el.style.fontSize = `${size}px`;
    }

    let spacing = 0;
    while (el.scrollWidth > el.clientWidth && spacing > -0.8) {
      spacing -= 0.1;
      el.style.letterSpacing = `${spacing.toFixed(1)}px`;
    }

    while (el.scrollWidth > el.clientWidth && size > floorMin) {
      size -= 0.25;
      el.style.fontSize = `${size}px`;
    }
  }
}

// Применяет авто-подгонку к названиям/производителям вин в сетке и в модалке.
// Лимиты шрифтов подобраны под мобайл/десктоп вручную.
function fitWineNameSingleLine() {
  const isMobile = window.matchMedia('(max-width: 767px)').matches;
  fitSingleLineElements(
    document.querySelectorAll('#grid .card:not(.photoCard) .titleWine'),
    16,
    isMobile ? 10 : 11,
    8
  );
  fitSingleLineElements(
    document.querySelectorAll('#grid .card:not(.photoCard) .titleProducer'),
    16,
    isMobile ? 10 : 11,
    8
  );

  const modalProducer = document.querySelector('#modalProducer');
  if (modalProducer && modalProducer.textContent.trim()) {
    fitSingleLineElements([modalProducer], 27, 17, 11);
  }

  const modalName = document.querySelector('#modalName');
  if (modalName && modalName.textContent.trim()) {
    fitSingleLineElements([modalName], 16, 11, 8);
  }

  const modalCountry = document.querySelector('#modalCountry');
  if (modalCountry && modalCountry.textContent.trim()) {
    fitSingleLineElements([modalCountry], 14, 10, 8);
  }
}

// Откладывает подгонку названий вин до следующего кадра (rAF) и схлопывает
// частые вызовы в один — чтобы не считать layout на каждый ре-рендер.
function scheduleWineNameFit() {
  if (wineNameFitRaf) cancelAnimationFrame(wineNameFitRaf);
  wineNameFitRaf = requestAnimationFrame(() => {
    wineNameFitRaf = null;
    fitWineNameSingleLine();
  });
}

// То же, что fitWineNameSingleLine, но для заголовков фото-карточек (Pastry/Bar/...).
function fitPhotoCardTitles() {
  fitSingleLineElements(
    document.querySelectorAll('#grid .photoCard .photoCardTitle'),
    18,
    13,
    11
  );
}

// rAF-обёртка для подгонки заголовков фото-карточек (дебаунс через кадр).
let photoCardTitleFitRaf = null;
function schedulePhotoCardTitleFit() {
  if (photoCardTitleFitRaf) cancelAnimationFrame(photoCardTitleFitRaf);
  photoCardTitleFitRaf = requestAnimationFrame(() => {
    photoCardTitleFitRaf = null;
    fitPhotoCardTitles();
  });
}

/**
 * Форматирует число как денежную сумму через Intl.NumberFormat.
 * Валюта берётся из конфига ресторана (по умолчанию USD), дробная часть
 * отбрасывается. Хак с заменой '$' на '$ ' добавляет пробел после знака валюты.
 */
function money(v) {
  const n = Number(v);
  if (!isFinite(n)) return '';
  const currency = state.config?.currency || 'USD';
  try {
    const formatted = new Intl.NumberFormat('en-US', {
      style: 'currency',
      currency: currency,
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    }).format(n);
    return formatted.replace('$', '$ ');
  } catch (e) {
    return `$ ${n}`;
  }
}

// Обновляет индикатор статуса (текст + цветная точка) в шапке.
// type='good' подсвечивает точку зелёным (успешная загрузка).
function setStatus(text, type='idle') {
  state.status = text;
  state.statusType = type;
  const statusText = $('statusText');
  const statusDot = $('statusDot');
  if (statusText) statusText.textContent = text;
  if (statusDot) {
    statusDot.classList.remove('good');

}
